name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  megalinter:
    name: MegaLinter
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run MegaLinter
        id: megalinter
        uses: trevor-vaughan/megalint-config@cc6d16f89d2408401b4a64647f95fd1323021573 # v0.1.3
        with:
          validate-all-codebase: ${{ github.event_name == 'push' && 'true' || 'false' }}

      - name: Upload MegaLinter reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: megalinter-reports
          path: ${{ steps.megalinter.outputs.reports-dir }}
          retention-days: 7

      - name: Upload SARIF to Code Scanning
        if: always() && hashFiles(steps.megalinter.outputs.sarif-file) != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: ${{ steps.megalinter.outputs.sarif-file }}
          category: megalinter
