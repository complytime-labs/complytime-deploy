name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Skaffold Render
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Add tools to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install deploy tools
        run: task tools:install-kustomize tools:install-skaffold

      - name: Validate all profiles
        run: task sk:validate

      - name: Render all profiles
        run: task sk:render-all

      - name: Install scan tools
        run: task tools:install-scan

      - name: Scan with Checkov
        run: |
          checkov -d .rendered-manifests/ \
            --framework kubernetes \
            --output sarif \
            --output-file-path .rendered-manifests/ \
            --soft-fail
        continue-on-error: true

      - name: Scan with Trivy
        run: |
          trivy config .rendered-manifests/ \
            --format sarif \
            --output .rendered-manifests/trivy-results.sarif \
            --exit-code 0

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kustomize-scan-results
          path: .rendered-manifests/
          retention-days: 7

      - name: Upload Checkov SARIF to Code Scanning
        if: always() && hashFiles('.rendered-manifests/results_sarif.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: .rendered-manifests/results_sarif.sarif
          category: checkov-kustomize

      - name: Upload Trivy SARIF to Code Scanning
        if: always() && hashFiles('.rendered-manifests/trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: .rendered-manifests/trivy-results.sarif
          category: trivy-kustomize
