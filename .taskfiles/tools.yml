version: "3"

vars:
  TOOLS_DIR: '{{.TOOLS_DIR | default (printf "%s/.local/bin" .HOME)}}'
  CHECKSUMS_FILE: "{{.ROOT_DIR}}/.tool_checksums"
  TASK_VERSION: "v3.51.1"
  OC_VERSION: "stable"
  KUSTOMIZE_VERSION: "v5.8.1"
  SKAFFOLD_VERSION: "v2.22.0"
  CHECKOV_VERSION: "3.3.1"
  TRIVY_VERSION: "0.71.1"
  YQ_VERSION: "v4.53.3"
  COMPLYCTL_VERSION: "v1.0.0-beta.0"
  SNAPPY_VERSION: "v0.2.4"
  AMPEL_VERSION: "v1.3.1"
  AMPEL_PROVIDER_VERSION: "v0.1.0"
  VENOM_VERSION: "v1.3.0"
  KUBESEAL_VERSION: "v0.37.0"

tasks:
  default:
    silent: true
    cmd: |
      task --list 2>/dev/null

  install:
    desc: "Install one or more tools (usage: task tools:install -- task oc kustomize yq)"
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: |
          Usage: task tools:install -- <tool> [tool...]
          Available tools: task oc kustomize skaffold checkov trivy yq complyctl ampel-provider snappy ampel venom kubeseal
    cmds:
      - for: { var: CLI_ARGS, split: " " }
        cmd: |
          case "{{.ITEM}}" in
            task|oc|kustomize|skaffold|checkov|trivy|yq|complyctl|ampel-provider|snappy|ampel|venom|kubeseal) ;;
            *) echo "Unknown tool: {{.ITEM}}"; echo "Available: task oc kustomize skaffold checkov trivy yq complyctl ampel-provider snappy ampel venom kubeseal"; exit 1 ;;
          esac
      - for: { var: CLI_ARGS, split: " " }
        task: _install-{{.ITEM}}

  install-deploy:
    desc: "Install all deployment tools (oc, kustomize, skaffold, kubeseal, yq)"
    cmds:
      - echo "==> Checking oc..."
      - task: _install-oc
      - echo "==> Checking kustomize..."
      - task: _install-kustomize
      - echo "==> Checking skaffold..."
      - task: _install-skaffold
      - echo "==> Checking kubeseal..."
      - task: _install-kubeseal
      - echo "==> Checking yq..."
      - task: _install-yq
      - echo "==> Deployment tools ready."

  install-scan:
    desc: "Install all scanning tools (checkov, trivy, snappy, ampel)"
    cmds:
      - echo "==> Checking checkov..."
      - task: _install-checkov
      - echo "==> Checking trivy..."
      - task: _install-trivy
      - echo "==> Checking snappy..."
      - task: _install-snappy
      - echo "==> Checking ampel..."
      - task: _install-ampel
      - echo "==> Scanning tools ready."

  _install-task:
    status:
      - command -v task
      - task --version 2>&1 | grep -q "{{.TASK_VERSION}}"
    cmds:
      - mkdir -p "{{.TOOLS_DIR}}"
      - curl -fsSL -o /tmp/task.tar.gz
        "https://github.com/go-task/task/releases/download/{{.TASK_VERSION}}/task_linux_amd64.tar.gz"
      - |
        EXPECTED=$(grep "task/{{.TASK_VERSION}}/linux/amd64" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/task.tar.gz" | sha256sum -c -
      - tar -xzf /tmp/task.tar.gz -C /tmp task
      - install /tmp/task "{{.TOOLS_DIR}}/task"
      - rm -f /tmp/task.tar.gz /tmp/task
      - task --version

  _install-oc:
    status:
      - command -v oc
    vars:
      OC_MIRROR: "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/{{.OC_VERSION}}"
    cmds:
      - mkdir -p "{{.TOOLS_DIR}}"
      - curl -fsSL -o /tmp/openshift-client-linux.tar.gz
        "{{.OC_MIRROR}}/openshift-client-linux.tar.gz"
      - |
        curl -fsSL "{{.OC_MIRROR}}/sha256sum.txt" -o /tmp/oc-sha256sum.txt
        cd /tmp && grep 'openshift-client-linux.tar.gz$' oc-sha256sum.txt | sha256sum -c -
        rm -f /tmp/oc-sha256sum.txt
      - tar -xzf /tmp/openshift-client-linux.tar.gz -C /tmp oc
      - install /tmp/oc "{{.TOOLS_DIR}}/oc"
      - rm -f /tmp/openshift-client-linux.tar.gz /tmp/oc /tmp/README.md
      - oc version --client

  _install-kustomize:
    status:
      - command -v kustomize
      - kustomize version 2>&1 | grep -q "{{.KUSTOMIZE_VERSION}}"
    cmds:
      - mkdir -p "{{.TOOLS_DIR}}"
      - curl -fsSL -o /tmp/kustomize.tar.gz
        "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F{{.KUSTOMIZE_VERSION}}/kustomize_{{.KUSTOMIZE_VERSION}}_linux_amd64.tar.gz"
      - |
        EXPECTED=$(grep "kustomize/{{.KUSTOMIZE_VERSION}}/linux/amd64" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/kustomize.tar.gz" | sha256sum -c -
      - tar -xzf /tmp/kustomize.tar.gz -C /tmp kustomize
      - install /tmp/kustomize "{{.TOOLS_DIR}}/kustomize"
      - rm -f /tmp/kustomize.tar.gz /tmp/kustomize
      - kustomize version

  _install-skaffold:
    status:
      - command -v skaffold
      - skaffold version 2>&1 | grep -q "{{.SKAFFOLD_VERSION}}"
    cmds:
      - mkdir -p "{{.TOOLS_DIR}}"
      - curl -fsSL -o /tmp/skaffold
        "https://storage.googleapis.com/skaffold/releases/{{.SKAFFOLD_VERSION}}/skaffold-linux-amd64"
      - |
        EXPECTED=$(grep "skaffold/{{.SKAFFOLD_VERSION}}/linux/amd64" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/skaffold" | sha256sum -c -
      - install /tmp/skaffold "{{.TOOLS_DIR}}/skaffold"
      - rm -f /tmp/skaffold
      - skaffold version

  _install-checkov:
    status:
      - command -v checkov
      - checkov --version 2>&1 | grep -q "{{.CHECKOV_VERSION}}"
    cmds:
      - pip download -q --no-deps -d /tmp "checkov=={{.CHECKOV_VERSION}}"
      - |
        EXPECTED=$(grep "checkov/v{{.CHECKOV_VERSION}}/any/any" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/checkov-{{.CHECKOV_VERSION}}-py3-none-any.whl" | sha256sum -c -
      - pip install -q "/tmp/checkov-{{.CHECKOV_VERSION}}-py3-none-any.whl"
      - rm -f "/tmp/checkov-{{.CHECKOV_VERSION}}-py3-none-any.whl"
      - checkov --version

  _install-trivy:
    status:
      - command -v trivy
      - trivy --version 2>&1 | grep -q "{{.TRIVY_VERSION}}"
    cmds:
      - mkdir -p "{{.TOOLS_DIR}}"
      - curl -fsSL -o /tmp/trivy.tar.gz
        "https://github.com/aquasecurity/trivy/releases/download/v{{.TRIVY_VERSION}}/trivy_{{.TRIVY_VERSION}}_Linux-64bit.tar.gz"
      - |
        EXPECTED=$(grep "trivy/v{{.TRIVY_VERSION}}/linux/amd64" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/trivy.tar.gz" | sha256sum -c -
      - tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
      - install /tmp/trivy "{{.TOOLS_DIR}}/trivy"
      - rm -f /tmp/trivy.tar.gz /tmp/trivy
      - trivy --version

  _install-yq:
    status:
      - command -v yq
      - yq --version 2>&1 | grep -q "{{.YQ_VERSION}}"
    cmds:
      - mkdir -p "{{.TOOLS_DIR}}"
      - curl -fsSL -o /tmp/yq
        "https://github.com/mikefarah/yq/releases/download/{{.YQ_VERSION}}/yq_linux_amd64"
      - |
        EXPECTED=$(grep "yq/{{.YQ_VERSION}}/linux/amd64" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/yq" | sha256sum -c -
      - install /tmp/yq "{{.TOOLS_DIR}}/yq"
      - rm -f /tmp/yq
      - yq --version

  _install-complyctl:
    status:
      - command -v complyctl
      - complyctl version 2>&1 | grep -q "{{.COMPLYCTL_VERSION}}"
    cmds:
      - mkdir -p "{{.TOOLS_DIR}}"
      - curl -fsSL -o /tmp/complyctl.tar.gz
        "https://github.com/complytime/complyctl/releases/download/{{.COMPLYCTL_VERSION}}/complyctl_linux_x86_64.tar.gz"
      - |
        EXPECTED=$(grep "complyctl/{{.COMPLYCTL_VERSION}}/linux/x86_64" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/complyctl.tar.gz" | sha256sum -c -
      - tar -xzf /tmp/complyctl.tar.gz -C /tmp
      - install /tmp/complyctl "{{.TOOLS_DIR}}/complyctl"
      - rm -rf /tmp/complyctl.tar.gz /tmp/complyctl /tmp/LICENSE /tmp/README.md /tmp/openscap-plugin
      - complyctl version

  _install-ampel-provider:
    internal: true
    status:
      - test -x "{{.HOME}}/.complytime/providers/complyctl-provider-ampel"
    cmds:
      - mkdir -p "{{.HOME}}/.complytime/providers"
      - curl -fsSL -o /tmp/ampel-provider.tar.gz
        "https://github.com/complytime/complytime-providers/releases/download/{{.AMPEL_PROVIDER_VERSION}}/complyctl-provider-ampel_linux_x86_64.tar.gz"
      - |
        EXPECTED=$(grep "complytime-providers/{{.AMPEL_PROVIDER_VERSION}}/linux/x86_64" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/ampel-provider.tar.gz" | sha256sum -c -
      - tar -xzf /tmp/ampel-provider.tar.gz -C /tmp
      - install /tmp/complyctl-provider-ampel "{{.HOME}}/.complytime/providers/complyctl-provider-ampel"
      - rm -rf /tmp/ampel-provider.tar.gz /tmp/complyctl-provider-ampel /tmp/LICENSE /tmp/README.md /tmp/CHANGELOG.md

  _install-snappy:
    status:
      - command -v snappy
      - snappy version 2>&1 | grep -q "{{.SNAPPY_VERSION}}"
    cmds:
      - mkdir -p "{{.TOOLS_DIR}}"
      - curl -fsSL -o /tmp/snappy
        "https://github.com/carabiner-dev/snappy/releases/download/{{.SNAPPY_VERSION}}/snappy-{{.SNAPPY_VERSION}}-linux-amd64"
      - |
        EXPECTED=$(grep "snappy/{{.SNAPPY_VERSION}}/linux/amd64" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/snappy" | sha256sum -c -
      - install /tmp/snappy "{{.TOOLS_DIR}}/snappy"
      - rm -f /tmp/snappy
      - snappy version

  _install-ampel:
    status:
      - command -v ampel
      - ampel version 2>&1 | grep -q "{{.AMPEL_VERSION}}"
    cmds:
      - mkdir -p "{{.TOOLS_DIR}}"
      - curl -fsSL -o /tmp/ampel
        "https://github.com/carabiner-dev/ampel/releases/download/{{.AMPEL_VERSION}}/ampel-{{.AMPEL_VERSION}}-linux-amd64"
      - |
        EXPECTED=$(grep "ampel-cli/{{.AMPEL_VERSION}}/linux/amd64" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/ampel" | sha256sum -c -
      - install /tmp/ampel "{{.TOOLS_DIR}}/ampel"
      - rm -f /tmp/ampel
      - ampel version

  _install-venom:
    status:
      - command -v venom
      - venom version 2>&1 | grep -q "{{.VENOM_VERSION}}"
    cmds:
      - mkdir -p "{{.TOOLS_DIR}}"
      - curl -fsSL -o /tmp/venom.linux-amd64
        "https://github.com/ovh/venom/releases/download/{{.VENOM_VERSION}}/venom.linux-amd64"
      - |
        EXPECTED=$(grep "venom/{{.VENOM_VERSION}}/linux/x86_64" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/venom.linux-amd64" | sha256sum -c -
      - install /tmp/venom.linux-amd64 "{{.TOOLS_DIR}}/venom"
      - rm -f /tmp/venom.linux-amd64
      - venom version

  _install-kubeseal:
    status:
      - command -v kubeseal
      - kubeseal --version 2>&1 | grep -q "{{.KUBESEAL_VERSION}}"
    cmds:
      - mkdir -p "{{.TOOLS_DIR}}"
      - curl -fsSL -o /tmp/kubeseal.tar.gz
        "https://github.com/bitnami-labs/sealed-secrets/releases/download/{{.KUBESEAL_VERSION}}/kubeseal-{{.KUBESEAL_VERSION | trimPrefix "v"}}-linux-amd64.tar.gz"
      - |
        EXPECTED=$(grep "kubeseal/{{.KUBESEAL_VERSION}}/linux/amd64" "{{.CHECKSUMS_FILE}}" | cut -d: -f2 | tr -d ' ')
        echo "${EXPECTED}  /tmp/kubeseal.tar.gz" | sha256sum -c -
      - tar -xzf /tmp/kubeseal.tar.gz -C /tmp kubeseal
      - install /tmp/kubeseal "{{.TOOLS_DIR}}/kubeseal"
      - rm -f /tmp/kubeseal.tar.gz /tmp/kubeseal
      - kubeseal --version
