version: "3"

vars:
  TEST_DIR: '{{.TEST_DIR | default ".test-output"}}'
  # _NS is the effective namespace for integration tests. Derived from the
  # root-level NAMESPACE var (which stays empty by default) with a fallback
  # to DEFAULT_NAMESPACE.  Named with underscore prefix to avoid leaking
  # into sibling includes (Taskfile vars are globally visible across includes).
  _NS: "{{.NAMESPACE | default .DEFAULT_NAMESPACE}}"
  BASE: '{{.BASE | default "local"}}'
  INTEGRATION_DIR: "tests/integration"
  # Deployment mode: crc (OpenShift Local) or quadlet (Podman Quadlet)
  MODE: '{{.MODE | default "crc"}}'
  QUADLET_RUNTIME: "quadlet/runtime"
  RC_IMAGE: "docker.io/rustfs/rc@sha256:ca85fbee9f96425446915cb08b41d5e246c782eeb3f6a00d3b8294fce5219891"
  S3_BUCKET: "complytime-evidence"
  S3_ACCESS_KEY: "rustfsadmin"
  S3_SECRET_KEY: "rustfsadmin"
  KEYCLOAK_PORT: "8180"
  # Set TEST_DEBUG=1 to print diagnostic dumps to stdout during test runs.
  # Diagnostics are always written to files in TEST_DIR regardless.
  TEST_DEBUG: '{{.TEST_DEBUG | default ""}}'

tasks:
  default:
    silent: true
    desc: List integration test tasks
    cmds:
      - task --list integration

  setup:
    desc: Install tools, deploy stack if needed, extract CA, start port-forwards, pull OCI bundle
    cmds:
      - task: clean
      - task: check-prereqs
      - task: :tools:_install-complyctl
      - task: :tools:_install-ampel-provider
      - task: :tools:_install-snappy
      - task: :tools:_install-ampel
      - task: :tools:_install-venom
      - task: _ensure-sealed-secrets
      - task: deploy-if-needed
      - task: _grant-developer-access
      - task: _ensure-bucket
      - task: extract-ca
      - task: port-forward
      - task: _wait-keycloak
      - task: pull-bundle

  deploy-if-needed:
    desc: Deploy the stack if no pods are running in the test namespace
    internal: true
    status:
      - |
        if [ "{{.MODE}}" = "quadlet" ]; then
          systemctl --user list-units 'complytime-*.service' --no-pager --plain \
            | grep -q 'running'
        else
          # Non-admin users cannot deploy — treat as up-to-date so the
          # deploy path is never entered.  The _deploy-crc guard will
          # catch any accidental invocation as a safety net.
          CURRENT_USER="$(oc whoami 2>/dev/null || true)"
          if [ "$CURRENT_USER" != "kubeadmin" ] && [ "$CURRENT_USER" != "system:admin" ]; then
            exit 0
          fi
          oc get pods -n "{{._NS}}" 2>/dev/null | grep -q Running
        fi
    cmds:
      - |
        if [ "{{.MODE}}" = "quadlet" ]; then
          echo "Quadlet stack not running — starting via quadlet:start..."
        else
          echo "Stack not deployed — deploying to namespace {{._NS}}..."
        fi
      - task: _deploy-quadlet
      - task: _deploy-crc

  _deploy-quadlet:
    internal: true
    status:
      - '[ "{{.MODE}}" != "quadlet" ]'
    cmds:
      - task: :quadlet:start

  _deploy-crc:
    internal: true
    status:
      - '[ "{{.MODE}}" = "quadlet" ]'
    cmds:
      - |
        # Deploying requires kubeadmin (oc new-project, secret creation, route patching).
        # If a non-admin user reaches this point it means the stack is not running and
        # they cannot deploy it — fail early with a clear message.
        CURRENT_USER="$(oc whoami 2>/dev/null || true)"
        if [ "$CURRENT_USER" != "kubeadmin" ] && [ "$CURRENT_USER" != "system:admin" ]; then
          echo "ERROR: Stack is not deployed and deploying requires kubeadmin."
          echo "  Current user: ${CURRENT_USER:-<not logged in>}"
          echo "  Run as kubeadmin first:  task integration:setup"
          echo "  Then re-run tests as developer:  task integration:test"
          exit 1
        fi
      - |
        if [ "{{._NS}}" != "{{.DEFAULT_NAMESPACE}}" ]; then
          task sk:_generate-overlay NAMESPACE="{{._NS}}" BASE="{{.BASE}}"
        fi
      - task: :sk:_deploy
        vars:
          NAMESPACE: "{{if ne ._NS .DEFAULT_NAMESPACE}}{{._NS}}{{end}}"

  _grant-developer-access:
    desc: Grant the CRC developer user edit access to the test namespace
    internal: true
    cmds:
      - |
        if [ "{{.MODE}}" = "quadlet" ]; then
          exit 0
        fi
        CURRENT_USER="$(oc whoami 2>/dev/null || true)"
        if [ "$CURRENT_USER" != "kubeadmin" ] && [ "$CURRENT_USER" != "system:admin" ]; then
          exit 0
        fi
        # Idempotent — no error if the rolebinding already exists.
        if oc adm policy add-role-to-user edit developer -n "{{._NS}}" 2>/dev/null; then
          echo "OK: granted 'edit' role to 'developer' in namespace {{._NS}}"
        else
          echo "WARNING: could not grant developer access to {{._NS}}"
          echo "  The developer user may not be able to run tests in this namespace."
          echo "  Grant manually:  oc adm policy add-role-to-user edit developer -n {{._NS}}"
        fi

  _ensure-bucket:
    desc: Create S3 bucket with anonymous read access
    internal: true
    cmds:
      - |
        if [ "{{.MODE}}" = "quadlet" ]; then
          echo "Ensuring S3 bucket with anonymous read (quadlet)..."
          podman run --rm --network complytime --entrypoint="" \
            "{{.RC_IMAGE}}" /bin/sh -c \
            'rc alias set local http://complytime-rustfs:9000 "{{.S3_ACCESS_KEY}}" "{{.S3_SECRET_KEY}}" && \
             rc mb --ignore-existing local/{{.S3_BUCKET}} && \
             rc anonymous set public local/{{.S3_BUCKET}}'
          echo "OK: bucket {{.S3_BUCKET}} ready with anonymous read"
        fi

  _start-keycloak:
    desc: Deploy/start Keycloak OIDC provider
    internal: true
    cmds:
      - |
        if [ "{{.MODE}}" = "quadlet" ]; then
          echo "Starting Keycloak (quadlet)..."
          # Ensure realm config is in runtime (quadlet-setup.sh --oidc does this,
          # but handle the case where setup was run without --oidc)
          REALM_SRC="overlays/local/keycloak/complytime-realm.json"
          REALM_DST="{{.QUADLET_RUNTIME}}/configs/complytime-realm.json"
          if [ ! -f "$REALM_DST" ]; then
            cp "$REALM_SRC" "$REALM_DST"
          fi
          systemctl --user start complytime-keycloak.service
        else
          echo "Deploying Keycloak to namespace {{._NS}}..."
          oc apply -k overlays/local/keycloak -n "{{._NS}}"
          oc rollout status deployment/keycloak -n "{{._NS}}" --timeout=120s
        fi

  _wait-keycloak:
    desc: Wait for Keycloak OIDC discovery via port-forward (requires port-forward running)
    internal: true
    cmds:
      - |
        echo "Waiting for Keycloak OIDC discovery..."
        KC_URL="http://localhost:{{.KEYCLOAK_PORT}}"
        for i in $(seq 1 60); do
          if curl -sf "${KC_URL}/realms/complytime/.well-known/openid-configuration" > /dev/null 2>&1; then
            echo "OK: Keycloak ready (attempt $i/60)"
            exit 0
          fi
          echo "  Waiting for Keycloak... (attempt $i/60)"
          sleep 2
        done
        echo "ERROR: Keycloak did not become ready after 120s"
        if [ "{{.MODE}}" = "quadlet" ]; then
          journalctl --user -u complytime-keycloak --no-pager -n 30 || true
        else
          oc logs deployment/keycloak -n "{{._NS}}" --tail=30 || true
        fi
        exit 1

  _ensure-port-forwards:
    desc: Verify all CRC port-forwards are alive, restart any dead ones
    internal: true
    cmds:
      - |
        if [ "{{.MODE}}" = "quadlet" ]; then
          exit 0
        fi
        mkdir -p "{{.TEST_DIR}}"
        RESTARTED=0
        for FWD in "svc/collector 8088:8088" "svc/collector 4318:4318" "svc/collector 4317:4317" \
                   "svc/keycloak {{.KEYCLOAK_PORT}}:8080" \
                   "svc/loki 3100:3100" "svc/rustfs 9000:9000" "svc/grafana 3000:3000"; do
          SVC=$(echo "$FWD" | cut -d' ' -f1)
          PORTS=$(echo "$FWD" | cut -d' ' -f2)
          LOCAL_PORT=$(echo "$PORTS" | cut -d: -f1)
          # Check if an oc port-forward process is running for this port
          if pgrep -f "oc port-forward.*${LOCAL_PORT}:" > /dev/null 2>&1; then
            continue
          fi
          echo "  Port-forward for $SVC $PORTS is dead — restarting"
          nohup oc port-forward "$SVC" "$PORTS" -n "{{._NS}}" \
            >> "{{.TEST_DIR}}/port-forward.log" 2>&1 &
          RESTARTED=1
        done
        if [ "$RESTARTED" -eq 1 ]; then
          sleep 2
          echo "OK: port-forwards restored"
        fi

  _swap-collector-config-oidc:
    desc: Replace collector config with OIDC-enabled variant and restart
    internal: true
    cmds:
      - |
        echo "Swapping collector to OIDC config..."
        if [ "{{.MODE}}" = "quadlet" ]; then
          OIDC_CONFIG="overlays/local/configs/collector-oidc.yaml"
          RUNTIME_CONFIG="{{.QUADLET_RUNTIME}}/configs/collector-config.yaml"
          # Backup current config
          cp "$RUNTIME_CONFIG" "${RUNTIME_CONFIG}.bak"
          # Copy OIDC config with same CA path adjustment as quadlet-setup.sh
          cp "$OIDC_CONFIG" "$RUNTIME_CONFIG"
          sed -i 's|/etc/ssl/certs/service-ca.crt|/etc/tls/ca.crt|g' "$RUNTIME_CONFIG"
          # Set OIDC issuer URL in env
          ENV_FILE="{{.QUADLET_RUNTIME}}/env/collector.env"
          sed -i 's|^OIDC_ISSUER_URL=.*|OIDC_ISSUER_URL=http://complytime-keycloak:8080/realms/complytime|' "$ENV_FILE"
          # Restart collector to pick up new config
          systemctl --user restart complytime-collector.service
        else
          # CRC: patch the ACTUAL ConfigMap the Deployment uses (kustomize
          # appends a hash suffix, so "collector-config" won't match) and then
          # restart the Deployment so the pod picks up the new content.
          #
          # Step 1: find the real ConfigMap name from the Deployment volume spec
          CM_NAME=$(oc get deployment collector -n "{{._NS}}" \
            -o jsonpath='{.spec.template.spec.volumes[?(@.name=="config")].configMap.name}')
          echo "Patching ConfigMap: $CM_NAME"
          # Step 2: replace the data key in that ConfigMap
          oc create configmap "$CM_NAME" \
            --from-file=otel-collector.yaml=overlays/local/configs/collector-oidc.yaml \
            -n "{{._NS}}" --dry-run=client -o yaml | oc apply -f -
          # Step 3: set OIDC env var (may or may not trigger rollout depending
          # on whether the value changed)
          oc set env deployment/collector OIDC_ISSUER_URL="http://keycloak:8080/realms/complytime" -n "{{._NS}}"
          # Step 4: always force a rollout — subPath ConfigMap mounts require
          # pod recreation, and oc set env only triggers a rollout if the value
          # actually changed (idempotent on reruns).
          oc rollout restart deployment/collector -n "{{._NS}}"
          oc rollout status deployment/collector -n "{{._NS}}" --timeout=60s
          # Step 5: verify the new (Running) pod has the OIDC config
          sleep 2  # brief settle for old pods to terminate
          NEW_POD=$(oc get pods -n "{{._NS}}" -l app=collector \
            --field-selector=status.phase=Running \
            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
          if [ -n "$NEW_POD" ]; then
            RETRIES=0
            while [ $RETRIES -lt 3 ]; do
              if oc exec "$NEW_POD" -n "{{._NS}}" -- cat /etc/otel-collector.yaml 2>/dev/null \
                   | grep -q 'authenticator:'; then
                echo "Verified: pod $NEW_POD has OIDC config"
                break
              fi
              RETRIES=$((RETRIES + 1))
              echo "Config not yet visible in pod (attempt $RETRIES/3), waiting..."
              sleep 3
            done
            if [ $RETRIES -eq 3 ]; then
              echo "ERROR: pod $NEW_POD still does not have OIDC config after 3 checks"
              oc exec "$NEW_POD" -n "{{._NS}}" -- head -10 /etc/otel-collector.yaml 2>/dev/null || true
              exit 1
            fi
          fi
          # Restart collector port-forwards — rollout replaced the pod, stale forwarders won't reconnect
          pkill -f "oc port-forward.*svc/collector" 2>/dev/null || true
          sleep 2
          for PORTS in 8088:8088 4318:4318 4317:4317; do
            nohup oc port-forward svc/collector "$PORTS" -n "{{._NS}}" \
              >> "{{.TEST_DIR}}/port-forward.log" 2>&1 &
          done
          sleep 2  # let port-forwards establish before health check
        fi
        # Wait for collector to become healthy with OIDC config.
        # The health endpoint is behind OIDC auth too, so unauthenticated
        # requests get 401.  A 401 proves the collector is up AND enforcing
        # OIDC — exactly what we need.
        echo "Waiting for collector restart..."
        for i in $(seq 1 15); do
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -k \
            "https://localhost:8088/eventreceiver/healthcheck" 2>/dev/null) || true
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
            echo "OK: collector is up (HTTP $HTTP_CODE)"
            exit 0
          fi
          sleep 2
        done
        echo "ERROR: collector did not restart with OIDC config"
        exit 1

  _swap-collector-config-local:
    desc: Restore collector to no-auth local config and restart
    internal: true
    cmds:
      - |
        echo "Restoring collector to local (no-auth) config..."
        if [ "{{.MODE}}" = "quadlet" ]; then
          RUNTIME_CONFIG="{{.QUADLET_RUNTIME}}/configs/collector-config.yaml"
          if [ -f "${RUNTIME_CONFIG}.bak" ]; then
            mv "${RUNTIME_CONFIG}.bak" "$RUNTIME_CONFIG"
          else
            cp "overlays/local/configs/collector-local.yaml" "$RUNTIME_CONFIG"
            sed -i 's|/etc/ssl/certs/service-ca.crt|/etc/tls/ca.crt|g' "$RUNTIME_CONFIG"
          fi
          # Clear OIDC issuer URL
          ENV_FILE="{{.QUADLET_RUNTIME}}/env/collector.env"
          sed -i 's|^OIDC_ISSUER_URL=.*|OIDC_ISSUER_URL=|' "$ENV_FILE"
          systemctl --user restart complytime-collector.service
        else
          # Find the actual ConfigMap name (kustomize hash suffix)
          CM_NAME=$(oc get deployment collector -n "{{._NS}}" \
            -o jsonpath='{.spec.template.spec.volumes[?(@.name=="config")].configMap.name}')
          oc create configmap "$CM_NAME" \
            --from-file=otel-collector.yaml=overlays/local/configs/collector-local.yaml \
            -n "{{._NS}}" --dry-run=client -o yaml | oc apply -f -
          # Reset OIDC_ISSUER_URL — set env triggers a rollout
          oc set env deployment/collector OIDC_ISSUER_URL="" -n "{{._NS}}"
          oc rollout status deployment/collector -n "{{._NS}}" --timeout=60s
          # Restart collector port-forwards — rollout replaced the pod, stale forwarders won't reconnect
          pkill -f "oc port-forward.*svc/collector" 2>/dev/null || true
          sleep 1
          for PORTS in 8088:8088 4318:4318 4317:4317; do
            nohup oc port-forward svc/collector "$PORTS" -n "{{._NS}}" \
              >> "{{.TEST_DIR}}/port-forward.log" 2>&1 &
          done
        fi
        echo "  Waiting for collector restart..."
        for i in $(seq 1 15); do
          if curl -sf -k "https://localhost:8088/eventreceiver/healthcheck" > /dev/null 2>&1; then
            echo "OK: collector restored to local config"
            exit 0
          fi
          sleep 2
        done
        echo "WARNING: collector may not have fully restarted"

  _stop-keycloak:
    desc: Stop/remove Keycloak
    internal: true
    cmds:
      - |
        if [ "{{.MODE}}" = "quadlet" ]; then
          systemctl --user stop complytime-keycloak.service 2>/dev/null || true
          echo "OK: Keycloak stopped (quadlet)"
        else
          oc delete deployment keycloak -n "{{._NS}}" --ignore-not-found
          oc delete service keycloak -n "{{._NS}}" --ignore-not-found
          oc delete configmap keycloak-realm -n "{{._NS}}" --ignore-not-found
          pkill -f "oc port-forward.*svc/keycloak" 2>/dev/null || true
          echo "OK: Keycloak removed (CRC)"
        fi

  _swap-grafana-oidc:
    desc: Configure Grafana with OIDC env vars pointing at local Keycloak (CRC only)
    internal: true
    cmds:
      - |
        echo "Configuring Grafana for OIDC testing..."
        KC_REALM="http://keycloak:8080/realms/complytime"
        oc set env deployment/grafana -n "{{._NS}}" \
          GF_AUTH_ANONYMOUS_ENABLED="false" \
          GF_AUTH_GENERIC_OAUTH_ENABLED="true" \
          GF_AUTH_GENERIC_OAUTH_NAME="Red Hat SSO" \
          GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP="true" \
          GF_AUTH_GENERIC_OAUTH_CLIENT_ID="grafana-test" \
          GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET="grafana-test-secret" \
          GF_AUTH_GENERIC_OAUTH_SCOPES="openid profile email" \
          GF_AUTH_GENERIC_OAUTH_AUTH_URL="${KC_REALM}/protocol/openid-connect/auth" \
          GF_AUTH_GENERIC_OAUTH_TOKEN_URL="${KC_REALM}/protocol/openid-connect/token" \
          GF_AUTH_GENERIC_OAUTH_API_URL="${KC_REALM}/protocol/openid-connect/userinfo" \
          GF_AUTH_SIGNOUT_REDIRECT_URL="${KC_REALM}/protocol/openid-connect/logout?post_logout_redirect_uri="
        oc rollout status deployment/grafana -n "{{._NS}}" --timeout=60s
        # Restart Grafana port-forward — rollout replaced the pod
        pkill -f "oc port-forward.*svc/grafana" 2>/dev/null || true
        sleep 1
        nohup oc port-forward svc/grafana 3000:3000 -n "{{._NS}}" \
          >> "{{.TEST_DIR}}/port-forward.log" 2>&1 &
        # Wait for Grafana to become healthy with OIDC config
        echo "Waiting for Grafana restart..."
        for i in $(seq 1 15); do
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' -k \
            "https://localhost:3000/api/health" 2>/dev/null) || true
          if [ "$HTTP_CODE" = "200" ]; then
            echo "OK: Grafana is up (HTTP $HTTP_CODE)"
            exit 0
          fi
          sleep 2
        done
        echo "ERROR: Grafana did not restart with OIDC config"
        exit 1

  _swap-grafana-local:
    desc: Restore Grafana to anonymous auth (no OIDC, CRC only)
    internal: true
    cmds:
      - |
        echo "Restoring Grafana to anonymous auth..."
        oc set env deployment/grafana -n "{{._NS}}" \
          GF_AUTH_ANONYMOUS_ENABLED="true" \
          GF_AUTH_GENERIC_OAUTH_ENABLED="false" \
          GF_AUTH_GENERIC_OAUTH_NAME- \
          GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP- \
          GF_AUTH_GENERIC_OAUTH_CLIENT_ID- \
          GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET- \
          GF_AUTH_GENERIC_OAUTH_SCOPES- \
          GF_AUTH_GENERIC_OAUTH_AUTH_URL- \
          GF_AUTH_GENERIC_OAUTH_TOKEN_URL- \
          GF_AUTH_GENERIC_OAUTH_API_URL- \
          GF_AUTH_SIGNOUT_REDIRECT_URL-
        oc rollout status deployment/grafana -n "{{._NS}}" --timeout=60s
        pkill -f "oc port-forward.*svc/grafana" 2>/dev/null || true
        sleep 1
        nohup oc port-forward svc/grafana 3000:3000 -n "{{._NS}}" \
          >> "{{.TEST_DIR}}/port-forward.log" 2>&1 &
        echo "  Waiting for Grafana restart..."
        for i in $(seq 1 15); do
          if curl -sf -k "https://localhost:3000/api/health" > /dev/null 2>&1; then
            echo "OK: Grafana restored to anonymous auth"
            exit 0
          fi
          sleep 2
        done
        echo "WARNING: Grafana may not have fully restarted"

  test-grafana-oidc:
    desc: Run Grafana OIDC wiring test suite (CRC only)
    status:
      - '[ "{{.MODE}}" = "quadlet" ]'
    cmds:
      - task: _ensure-port-forwards
      - task: _wait-keycloak
      - task: _swap-grafana-oidc
      - defer: { task: _swap-grafana-local }
      - |
        if [ ! -f "{{.TEST_DIR}}/service-ca.crt" ]; then
          echo "ERROR: service CA cert not found at {{.TEST_DIR}}/service-ca.crt"
          echo "  Run: task integration:setup"
          exit 1
        fi
        mkdir -p "{{.TEST_DIR}}"
        case "{{.TEST_DIR}}" in /*) CA_CERT="{{.TEST_DIR}}/service-ca.crt" ;; *) CA_CERT="$(pwd)/{{.TEST_DIR}}/service-ca.crt" ;; esac
        VENOM_ARGS=(
          "{{.INTEGRATION_DIR}}/grafana-oidc-wiring.venom.yml"
          --lib-dir "{{.INTEGRATION_DIR}}/lib"
          --output-dir "{{.TEST_DIR}}"
          --var "ca_cert=${CA_CERT}"
          --var "keycloak_port={{.KEYCLOAK_PORT}}"
        )
        VENOM_ARGS+=(
          --var "grafana_host=localhost"
          --var "keycloak_host=localhost"
        )
        venom run "${VENOM_ARGS[@]}" -vv

  test-oidc:
    desc: Run OIDC auth boundary test suite
    cmds:
      - task: _ensure-port-forwards
      - task: _wait-keycloak
      - task: _swap-collector-config-oidc
      - defer: { task: _swap-collector-config-local }
      - |
        # --- OIDC diagnostic: capture state BEFORE venom runs ---
        DIAG="{{.TEST_DIR}}/diag-oidc-pre.txt"
        mkdir -p "{{.TEST_DIR}}"
        if [ "{{.MODE}}" = "quadlet" ]; then
          {
            echo "=== timestamp: $(date -Iseconds) ==="
            echo "=== mode: quadlet ==="
            echo ""
            echo "=== Collector service status ==="
            systemctl --user status complytime-collector.service --no-pager 2>&1 || true
            echo ""
            echo "=== Keycloak service status ==="
            systemctl --user status complytime-keycloak.service --no-pager 2>&1 || true
            echo ""
            echo "=== No-token POST (expect 401 if OIDC enforced) ==="
            case "{{.TEST_DIR}}" in /*) CA_CERT="{{.TEST_DIR}}/service-ca.crt" ;; *) CA_CERT="$(pwd)/{{.TEST_DIR}}/service-ca.crt" ;; esac
            CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              --http1.1 --cacert "$CA_CERT" \
              --resolve "localhost:8088:127.0.0.1" \
              -X POST -H "Content-Type: application/json" \
              -d '{"activity_id":0,"category_uid":6,"class_uid":6007,"metadata":{"product":{"name":"diag"}},"status":"success","status_id":1,"policy":{"uid":"diag"}}' \
              "https://localhost:8088/eventsource/receiver" 2>/dev/null) || CODE="000"
            echo "No-token POST returned: ${CODE}"
          } > "$DIAG" 2>&1
        else
          NS="{{._NS}}"
          {
            echo "=== timestamp: $(date -Iseconds) ==="
            echo "=== mode: crc ==="
            echo ""
            echo "=== Collector env vars ==="
            oc set env deployment/collector -n "$NS" --list 2>&1
            echo ""
            echo "=== Collector logs (OIDC/auth/error) ==="
            oc logs deployment/collector -n "$NS" --tail=50 2>&1 \
              | grep -iE 'oidc|authenticat|extension|error|fail|issuer|jwks|audience|provider' \
              || echo "(no matching lines)"
            echo ""
            echo "=== No-token POST via port-forward (expect 401 if OIDC enforced) ==="
            case "{{.TEST_DIR}}" in /*) CA_CERT="{{.TEST_DIR}}/service-ca.crt" ;; *) CA_CERT="$(pwd)/{{.TEST_DIR}}/service-ca.crt" ;; esac
            CHOST="collector.{{._NS}}.svc"
            CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              --http1.1 --cacert "$CA_CERT" \
              --resolve "${CHOST}:8088:127.0.0.1" \
              -X POST -H "Content-Type: application/json" \
              -d '{"activity_id":0,"category_uid":6,"class_uid":6007,"metadata":{"product":{"name":"diag"}},"status":"success","status_id":1,"policy":{"uid":"diag"}}' \
              "https://${CHOST}:8088/eventsource/receiver" 2>/dev/null) || CODE="000"
            echo "No-token POST returned: ${CODE}"
          } > "$DIAG" 2>&1
        fi
        if [ -n "{{.TEST_DEBUG}}" ]; then
          echo "Diagnostic written to $DIAG"
          cat "$DIAG"
        fi
      - |
        if [ ! -f "{{.TEST_DIR}}/service-ca.crt" ]; then
          echo "ERROR: service CA cert not found at {{.TEST_DIR}}/service-ca.crt"
          echo "  Run: task integration:setup"
          exit 1
        fi
        mkdir -p "{{.TEST_DIR}}"
        case "{{.TEST_DIR}}" in /*) CA_CERT="{{.TEST_DIR}}/service-ca.crt" ;; *) CA_CERT="$(pwd)/{{.TEST_DIR}}/service-ca.crt" ;; esac
        VENOM_ARGS=(
          "{{.INTEGRATION_DIR}}/oidc-auth.venom.yml"
          --lib-dir "{{.INTEGRATION_DIR}}/lib"
          --output-dir "{{.TEST_DIR}}"
          --var "ca_cert=${CA_CERT}"
          --var "keycloak_port={{.KEYCLOAK_PORT}}"
        )
        if [ "{{.MODE}}" = "quadlet" ]; then
          VENOM_ARGS+=(
            --var "collector_host=localhost"
            --var "keycloak_host=localhost"
          )
        else
          VENOM_ARGS+=(
            --var "collector_host=collector.{{._NS}}.svc"
            --var "keycloak_host=localhost"
          )
        fi
        venom run "${VENOM_ARGS[@]}" -vv

  test-otlp-oidc:
    desc: Run OTLP OIDC auth boundary test suite
    cmds:
      - task: _ensure-port-forwards
      - task: _wait-keycloak
      - task: _swap-collector-config-oidc
      - defer: { task: _swap-collector-config-local }
      - |
        mkdir -p "{{.TEST_DIR}}"
        VENOM_ARGS=(
          "{{.INTEGRATION_DIR}}/otlp-oidc-auth.venom.yml"
          --lib-dir "{{.INTEGRATION_DIR}}/lib"
          --output-dir "{{.TEST_DIR}}"
          --var "keycloak_port={{.KEYCLOAK_PORT}}"
        )
        if [ "{{.MODE}}" = "quadlet" ]; then
          VENOM_ARGS+=(
            --var "otlp_host=localhost"
            --var "keycloak_host=localhost"
          )
        else
          VENOM_ARGS+=(
            --var "otlp_host=localhost"
            --var "keycloak_host=localhost"
          )
        fi
        venom run "${VENOM_ARGS[@]}" -vv

  test-ingest:
    desc: Run complyctl OTLP ingest test suite (requires GITHUB_TOKEN)
    cmds:
      - task: _ensure-port-forwards
      - task: _wait-keycloak
      - |
        if [ ! -f "{{.TEST_DIR}}/service-ca.crt" ]; then
          echo "ERROR: service CA cert not found at {{.TEST_DIR}}/service-ca.crt"
          echo "  Run: task integration:setup"
          exit 1
        fi
        mkdir -p "{{.TEST_DIR}}"
        case "{{.TEST_DIR}}" in /*) CA_CERT="{{.TEST_DIR}}/service-ca.crt" ;; *) CA_CERT="$(pwd)/{{.TEST_DIR}}/service-ca.crt" ;; esac
        VENOM_ARGS=(
          "{{.INTEGRATION_DIR}}/complyctl-ingest.venom.yml"
          --lib-dir "{{.INTEGRATION_DIR}}/lib"
          --output-dir "{{.TEST_DIR}}"
          --var "ca_cert=${CA_CERT}"
          --var "keycloak_port={{.KEYCLOAK_PORT}}"
        )
        if [ "{{.MODE}}" = "quadlet" ]; then
          VENOM_ARGS+=(
            --var "loki_host=localhost"
            --var "keycloak_host=localhost"
          )
        else
          VENOM_ARGS+=(
            --var "loki_host=loki.{{._NS}}.svc"
            --var "keycloak_host=localhost"
          )
        fi
        venom run "${VENOM_ARGS[@]}" -vv

  check-prereqs:
    desc: Verify required CLI tools are available
    internal: true
    cmds:
      - |
        REQUIRED="jq yq curl"
        if [ "{{.MODE}}" = "crc" ]; then
          REQUIRED="$REQUIRED oc kubeseal openssl"
        fi
        for cmd in $REQUIRED; do
          if ! command -v "$cmd" &>/dev/null; then
            echo "ERROR: $cmd not found"
            exit 1
          fi
        done
        echo "OK: prerequisites available (mode={{.MODE}})"

  _ensure-sealed-secrets:
    desc: Ensure SealedSecrets with dev values exist in the test namespace
    internal: true
    cmds:
      - |
        if [ "{{.MODE}}" = "quadlet" ]; then
          echo "Quadlet mode — SealedSecrets not applicable"
          exit 0
        fi
        ./scripts/ensure-sealed-secrets.sh "{{._NS}}"

  extract-ca:
    desc: Extract CA certificate for TLS verification
    status:
      - |
        # Re-extract when switching between CRC and quadlet — the CA differs.
        # In quadlet mode, also re-extract when the source CA has been regenerated
        # (e.g. by a fresh quadlet:setup) so tests don't use a stale copy.
        [ -f "{{.TEST_DIR}}/service-ca.crt" ] || exit 1
        if [ "{{.MODE}}" = "quadlet" ]; then
          openssl x509 -in "{{.TEST_DIR}}/service-ca.crt" -noout -subject 2>/dev/null \
            | grep -q "ComplyTime Local CA" || exit 1
          # Detect stale copy: compare against the live runtime CA.
          CA_SRC="{{.QUADLET_RUNTIME}}/certs/ca.crt"
          [ -f "$CA_SRC" ] || exit 1
          diff -q "$CA_SRC" "{{.TEST_DIR}}/service-ca.crt" >/dev/null 2>&1
        else
          openssl x509 -in "{{.TEST_DIR}}/service-ca.crt" -noout -subject 2>/dev/null \
            | grep -q "openshift-service-serving-signer"
        fi
    cmds:
      - |
        mkdir -p "{{.TEST_DIR}}"
        if [ "{{.MODE}}" = "quadlet" ]; then
          CA_SRC="{{.QUADLET_RUNTIME}}/certs/ca.crt"
          if [ ! -f "$CA_SRC" ]; then
            echo "ERROR: Quadlet CA cert not found at $CA_SRC"
            echo "  Run: task quadlet:setup"
            exit 1
          fi
          cp "$CA_SRC" "{{.TEST_DIR}}/service-ca.crt"
          echo "OK: Quadlet CA cert copied to {{.TEST_DIR}}/service-ca.crt"
        else
          echo "Extracting service CA from namespace {{._NS}}..."
          for i in $(seq 1 12); do
            CA=$(oc get configmap service-ca-bundle -n "{{._NS}}" \
              -o jsonpath='{.data.service-ca\.crt}' 2>/dev/null) || true
            if [ -n "$CA" ]; then
              echo "$CA" > "{{.TEST_DIR}}/service-ca.crt"
              echo "OK: service CA extracted to {{.TEST_DIR}}/service-ca.crt"
              exit 0
            fi
            echo "  Waiting for service CA bundle... ($i/12)"
            sleep 5
          done
          echo "ERROR: service CA bundle not available after 60s"
          echo "  Ensure the stack is deployed: task sk:run"
          exit 1
        fi

  pull-bundle:
    desc: Pull OCI policy bundle via complyctl
    dir: "{{.INTEGRATION_DIR}}"
    cmds:
      - |
        echo "Pulling OCI policy bundle..."
        if complyctl get 2>&1; then
          echo "OK: bundle pulled"
        else
          echo "WARNING: complyctl get failed (Quay.io may be unreachable)"
          echo "  Pull tests will be skipped"
        fi
        # complyctl writes a .complytime/ log dir in cwd — move it to .test-output/
        if [ -d .complytime ]; then
          TEST_OUT="{{.TEST_DIR}}"
          # Resolve relative TEST_DIR against the repo root (we're in tests/integration/)
          if [[ "$TEST_OUT" != /* ]]; then
            TEST_OUT="../../$TEST_OUT"
          fi
          rm -rf "${TEST_OUT}/.complytime"
          mv .complytime "${TEST_OUT}/"
        fi

  test:
    desc: Run all integration test suites (runs setup if needed)
    cmds:
      - task: setup
      - defer: { task: _cleanup }
      - task: check-stack
      - task: test-pull
      - task: test-pipeline
      - task: test-oidc
      - task: test-otlp-oidc
      - task: test-ingest
      - task: test-grafana-oidc

  _cleanup:
    internal: true
    cmds:
      - task: _cleanup-quadlet
      - task: _cleanup-crc

  _cleanup-quadlet:
    internal: true
    status:
      - '[ "{{.MODE}}" != "quadlet" ]'
    cmds:
      - task: :quadlet:teardown
        vars:
          FORCE: "true"

  _cleanup-crc:
    internal: true
    status:
      - '[ "{{.MODE}}" = "quadlet" ]'
    cmds:
      - task: port-forward-stop

  port-forward:
    desc: Start oc port-forward for all services (CRC mode only)
    cmds:
      - |
        if [ "{{.MODE}}" = "quadlet" ]; then
          echo "Quadlet publishes ports directly — port-forward not needed"
          exit 0
        fi

        # Detect non-oc processes holding ports we need to forward.
        # Podman rootless networking (rootlessport, pasta) binds 0.0.0.0:<port>
        # and silently shadows oc port-forward, routing traffic to the wrong backend.
        CONFLICT=0
        for FWD in "svc/collector 8088:8088" "svc/collector 4318:4318" "svc/collector 4317:4317" \
                   "svc/keycloak {{.KEYCLOAK_PORT}}:8080" \
                   "svc/loki 3100:3100" "svc/rustfs 9000:9000" "svc/grafana 3000:3000"; do
          LOCAL_PORT=$(echo "$FWD" | cut -d' ' -f2 | cut -d: -f1)
          HOLDER=$(ss -tlnp "sport = :${LOCAL_PORT}" 2>/dev/null \
            | awk '/LISTEN/{print $NF}' | grep -oP 'users:\(\("\K[^"]+' | head -1)
          if [ -n "$HOLDER" ] && [ "$HOLDER" != "oc" ]; then
            echo "ERROR: port $LOCAL_PORT is held by '$HOLDER' (not oc port-forward)"
            CONFLICT=1
          fi
        done
        if [ "$CONFLICT" -eq 1 ]; then
          echo ""
          echo "  Quadlet/Podman containers conflict with CRC port-forwards."
          echo "  Stop them first:  task quadlet:teardown"
          exit 1
        fi

        # Kill any stale port-forwards from a previous run (any namespace).
        # A previous run with a different NAMESPACE would still hold the
        # same local ports, causing TLS SAN mismatches.
        for FWD in "svc/collector 8088:8088" "svc/collector 4318:4318" "svc/collector 4317:4317" \
                   "svc/keycloak {{.KEYCLOAK_PORT}}:8080" \
                   "svc/loki 3100:3100" "svc/rustfs 9000:9000" "svc/grafana 3000:3000"; do
          LOCAL_PORT=$(echo "$FWD" | cut -d' ' -f2 | cut -d: -f1)
          pkill -f "oc port-forward.*${LOCAL_PORT}:" 2>/dev/null || true
        done
        sleep 1
        mkdir -p "{{.TEST_DIR}}"

        for FWD in "svc/keycloak {{.KEYCLOAK_PORT}}:8080" \
                   "svc/collector 8088:8088" "svc/collector 4318:4318" "svc/collector 4317:4317" \
                   "svc/loki 3100:3100" "svc/rustfs 9000:9000" "svc/grafana 3000:3000"; do
          SVC=$(echo "$FWD" | cut -d' ' -f1)
          PORTS=$(echo "$FWD" | cut -d' ' -f2)
          LOCAL_PORT=$(echo "$PORTS" | cut -d: -f1)
          nohup oc port-forward "$SVC" "$PORTS" -n "{{._NS}}" \
            >> "{{.TEST_DIR}}/port-forward.log" 2>&1 &
          echo "  Forwarding $SVC $PORTS (pid $!)"
        done

        # Wait for collector webhook to become reachable.
        # With OIDC enabled, unauthenticated requests return 401 — that still
        # proves the port-forward is working.
        echo "  Waiting for port-forwards to establish..."
        for i in $(seq 1 15); do
          CODE=$(curl -s -o /dev/null -w '%{http_code}' -k \
            https://localhost:8088/eventreceiver/healthcheck 2>/dev/null) || CODE="000"
          if [ "$CODE" = "200" ] || [ "$CODE" = "401" ]; then
            echo "OK: port-forwards ready (HTTP $CODE)"
            echo "  Log: {{.TEST_DIR}}/port-forward.log"
            echo "  Stop: task integration:port-forward-stop"
            exit 0
          fi
          sleep 2
        done
        echo "ERROR: port-forwards did not become ready after 30s"
        echo "  Check log: {{.TEST_DIR}}/port-forward.log"
        echo "  Verify pods are running: oc get pods -n {{._NS}}"
        cat "{{.TEST_DIR}}/port-forward.log" 2>/dev/null || true
        exit 1

  port-forward-stop:
    desc: Stop all oc port-forward processes for the test namespace
    cmds:
      - |
        if [ "{{.MODE}}" = "quadlet" ]; then
          echo "Quadlet publishes ports directly — nothing to stop"
          exit 0
        fi
        # Kill port-forwards on all integration ports regardless of namespace,
        # so switching NAMESPACE between runs doesn't leave stale forwards.
        for FWD in "svc/collector 8088:8088" "svc/collector 4318:4318" "svc/collector 4317:4317" \
                   "svc/keycloak {{.KEYCLOAK_PORT}}:8080" \
                   "svc/loki 3100:3100" "svc/rustfs 9000:9000" "svc/grafana 3000:3000"; do
          LOCAL_PORT=$(echo "$FWD" | cut -d' ' -f2 | cut -d: -f1)
          pkill -f "oc port-forward.*${LOCAL_PORT}:" 2>/dev/null || true
        done
        echo "OK: port-forwards stopped"

  test-pull:
    desc: Run complyctl pull test suite
    cmds:
      - |
        mkdir -p "{{.TEST_DIR}}"
        venom run "{{.INTEGRATION_DIR}}/complyctl-pull.venom.yml" \
          --lib-dir "{{.INTEGRATION_DIR}}/lib" \
          --output-dir "{{.TEST_DIR}}" \
          --var "HOME={{.HOME}}" \
          -vv

  test-pipeline:
    desc: Run evidence pipeline test suite
    cmds:
      - task: _ensure-port-forwards
      - task: _wait-keycloak
      - |
        if [ ! -f "{{.TEST_DIR}}/service-ca.crt" ]; then
          echo "ERROR: service CA cert not found at {{.TEST_DIR}}/service-ca.crt"
          echo "  Run: task integration:setup"
          exit 1
        fi
        mkdir -p "{{.TEST_DIR}}"
        case "{{.TEST_DIR}}" in /*) CA_CERT="{{.TEST_DIR}}/service-ca.crt" ;; *) CA_CERT="$(pwd)/{{.TEST_DIR}}/service-ca.crt" ;; esac
        VENOM_ARGS=(
          "{{.INTEGRATION_DIR}}/evidence-pipeline.venom.yml"
          --lib-dir "{{.INTEGRATION_DIR}}/lib"
          --output-dir "{{.TEST_DIR}}"
          --var "ca_cert=${CA_CERT}"
        )
        if [ "{{.MODE}}" = "quadlet" ]; then
          # Quadlet certs have SAN DNS:localhost — connect directly
          VENOM_ARGS+=(
            --var "collector_host=localhost"
            --var "loki_host=localhost"
          )
        else
          # CRC: use namespace-qualified service hostnames to match cert SANs
          VENOM_ARGS+=(
            --var "collector_host=collector.{{._NS}}.svc"
            --var "loki_host=loki.{{._NS}}.svc"
          )
        fi
        VENOM_ARGS+=(
          --var "keycloak_host=localhost"
          --var "keycloak_port={{.KEYCLOAK_PORT}}"
        )
        venom run "${VENOM_ARGS[@]}" -vv --stop-on-failure

  check-stack:
    desc: Verify the stack is reachable and OIDC is enforced
    internal: true
    cmds:
      - |
        CODE=$(curl -s -o /dev/null -w '%{http_code}' -k \
          "https://localhost:8088/eventreceiver/healthcheck" 2>/dev/null) || CODE="000"
        if [ "$CODE" = "200" ] || [ "$CODE" = "401" ]; then
          echo "OK: collector webhook reachable (HTTP $CODE, mode={{.MODE}})"
        else
          echo "ERROR: collector webhook not reachable at https://localhost:8088 (HTTP $CODE)"
          if [ "{{.MODE}}" = "quadlet" ]; then
            echo "  Ensure the stack is running: task quadlet:start"
          else
            echo "  If using sk:run, start port-forwards first:"
            echo "    task integration:port-forward"
            echo "  Or use sk:dev which forwards automatically:"
            echo "    task sk:dev"
          fi
          exit 1
        fi

  clean:
    desc: Remove test artifacts and pulled bundles
    cmds:
      - rm -rf "{{.TEST_DIR}}"
      - rm -rf "{{.HOME}}/.complytime/policies"
      - 'echo "OK: test artifacts cleaned"'
