version: '3'

tasks:
  default:
    silent: true
    cmd: task crc --list

  _require-crc:
    internal: true
    preconditions:
      - sh: command -v crc
        msg: "crc not installed — download from https://developers.redhat.com/products/openshift-local"

  start:
    desc: Start OpenShift Local cluster
    deps: [_require-crc]
    cmds:
      - crc start
      - echo ''
      - crc console --credentials
      - echo ''
      - 'echo "Next: eval \$(crc oc-env) && task crc:login"'

  stop:
    desc: Stop OpenShift Local (preserves cluster data)
    deps: [_require-crc]
    cmds:
      - crc stop

  status:
    desc: Show OpenShift Local cluster status
    deps: [_require-crc]
    cmds:
      - crc status

  login:
    desc: Log in to the CRC cluster (opens browser)
    deps: [_require-crc]
    preconditions:
      - sh: command -v oc
        msg: "oc not found — run 'eval $(crc oc-env)' first"
    cmds:
      - oc login --web --server=https://api.crc.testing:6443

  sealed-secrets:
    desc: Install the SealedSecrets controller on the CRC cluster
    deps: [_require-crc]
    preconditions:
      - sh: oc whoami &>/dev/null
        msg: "Not logged into a cluster — run 'task crc:login' first"
    cmds:
      - oc apply -f https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.1/controller.yaml
      - oc -n kube-system rollout status deployment/sealed-secrets-controller --timeout=120s

  delete:
    desc: Delete the CRC cluster and all data — DESTRUCTIVE
    deps: [_require-crc]
    prompt: "This will destroy the CRC cluster and all its data. Continue?"
    cmds:
      - crc delete
