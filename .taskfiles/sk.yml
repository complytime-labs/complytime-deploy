version: "3"

vars:
  OC_PROJECT:
    sh: oc project -q 2>/dev/null || echo "<not logged in>"
  OC_SERVER:
    sh: oc whoami --show-server 2>/dev/null || echo "<not logged in>"

tasks:
  default:
    silent: true
    cmd: task sk --list

  dev:
    desc: Start continuous dev loop (deploy, port-forward, log-tail, cleanup on exit)
    prompt: "This will deploy to {{.OC_SERVER}} (project: {{.OC_PROJECT}}). Continue?"
    cmds:
      - skaffold dev

  _deploy:
    internal: true
    cmds:
      - skaffold run {{if .CLI_ARGS}}-p {{.CLI_ARGS}}{{end}}
      - oc wait --for=condition=ready pod -l app=collector -n {{.NAMESPACE | default "complytime-dev"}} --timeout=120s
      - oc wait --for=condition=ready pod -l app=loki -n {{.NAMESPACE | default "complytime-dev"}} --timeout=120s

  run:
    desc: "One-shot deploy (usage: task sk:run, or task sk:run -- stage)"
    prompt: "This will deploy to {{.OC_SERVER}} (project: {{.OC_PROJECT}}). Continue?"
    cmds:
      - task: _deploy

  render:
    desc: "Render manifests to stdout (usage: task sk:render, or task sk:render -- stage)"
    cmds:
      - skaffold render {{if .CLI_ARGS}}-p {{.CLI_ARGS}}{{end}}

  render-all:
    desc: Render all Skaffold profiles to .rendered-manifests/ for scanning
    vars:
      RENDER_DIR: "{{.ROOT_DIR}}/.rendered-manifests"
    cmds:
      - rm -rf "{{.RENDER_DIR}}"
      - mkdir -p "{{.RENDER_DIR}}"
      - skaffold render > "{{.RENDER_DIR}}/local.yaml"
      - skaffold render -p stage > "{{.RENDER_DIR}}/stage.yaml"
      - skaffold render -p production > "{{.RENDER_DIR}}/production.yaml"
      - echo "Rendered all profiles to {{.RENDER_DIR}}/"

  validate:
    desc: Validate all Skaffold profiles (render + server-side dry-run if logged in)
    cmds:
      - echo "Rendering default (local)..." && skaffold render > /dev/null
      - echo "Rendering stage..." && skaffold render -p stage > /dev/null
      - echo "Rendering production..." && skaffold render -p production > /dev/null
      - |
        if oc whoami &>/dev/null; then
          echo "Server-side dry-run against {{.OC_SERVER}}..."
          skaffold render | oc apply --dry-run=server -f -
        else
          echo "Skipping server-side dry-run (not logged into a cluster)"
        fi
      - echo "All profiles validated successfully"

  status:
    desc: Show pod status in current oc project
    cmds:
      - oc get pods

  delete:
    desc: "Delete deployed resources and PVCs — DESTRUCTIVE (usage: task sk:delete, or task sk:delete -- stage)"
    prompt: "This will DELETE resources and persistent volumes on {{.OC_SERVER}} (project: {{.OC_PROJECT}}). Continue?"
    cmds:
      - skaffold delete {{if .CLI_ARGS}}-p {{.CLI_ARGS}}{{end}}
      - |
        PVCS=$(oc get pvc -o name 2>/dev/null)
        if [ -n "$PVCS" ]; then
          echo "Deleting PVCs to reclaim disk..."
          oc delete pvc --all --wait=false
          echo "PVCs deleted"
        else
          echo "No PVCs to clean up"
        fi
