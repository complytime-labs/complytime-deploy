version: "3"

vars:
  OC_SERVER:
    sh: oc whoami --show-server 2>/dev/null || echo "<not logged in>"
  BASE: '{{.BASE | default "local"}}'
  APPCODE: '{{.APPCODE | default "COMPLYTIME"}}'

tasks:
  default:
    silent: true
    cmd: task sk --list

  _generate-overlay:
    vars:
      OVERLAY_DIR: "{{.ROOT_DIR}}/overlays/custom-{{.NAMESPACE}}"
      BASE_DIR: "{{.ROOT_DIR}}/overlays/{{.BASE}}"
    preconditions:
      - sh: test -f "{{.BASE_DIR}}/kustomization.yaml"
        msg: "Base overlay not found: overlays/{{.BASE}}/kustomization.yaml"
    cmds:
      - mkdir -p "{{.OVERLAY_DIR}}"
      - |
        APPCODE_BLOCK=""
        if [ -n "{{.APPCODE}}" ]; then
          APPCODE_BLOCK="$(printf '%s\n' \
            "labels:" \
            "  - pairs:" \
            "      paas.redhat.com/appcode: {{.APPCODE}}" \
            "    includeSelectors: false" \
            "commonAnnotations:" \
            "  AppCode: {{.APPCODE}}")"
        fi
        printf '%s\n' \
          "apiVersion: kustomize.config.k8s.io/v1beta1" \
          "kind: Kustomization" \
          "namespace: {{.NAMESPACE}}" \
          "$APPCODE_BLOCK" \
          "resources:" \
          "  - ../{{.BASE}}/" \
          >"{{.OVERLAY_DIR}}/kustomization.yaml"
      - |
        printf '%s\n' \
          "apiVersion: skaffold/v4beta13" \
          "kind: Config" \
          "metadata:" \
          "  name: complytime-custom" \
          "manifests:" \
          "  kustomize:" \
          '    paths: ["overlays/custom-{{.NAMESPACE}}"]' \
          "deploy:" \
          "  kubectl:" \
          "    hooks:" \
          "      before:" \
          "        - host:" \
          "            command:" \
          '              ["sh", "-c", "oc new-project {{.NAMESPACE}} 2>/dev/null || oc project {{.NAMESPACE}}"]' \
          "        - host:" \
          "            command:" \
          '              ["sh", "-c", "oc delete job rustfs-create-bucket -n {{.NAMESPACE}} 2>/dev/null || true"]' \
          "        - host:" \
          '            command: ["./scripts/apply-sealed-secrets.sh", "{{.BASE}}", "{{.NAMESPACE}}"]' \
          "      after:" \
          "        - host:" \
          '            command: ["./scripts/post-deploy.sh", "{{.BASE}}", "{{.NAMESPACE}}"]' \
          >"{{.OVERLAY_DIR}}/skaffold.yaml"
      - 'echo "Generated overlay at overlays/custom-{{.NAMESPACE}}/ (base: {{.BASE}}, appcode: {{.APPCODE}})"'

  dev:
    desc: Start continuous dev loop (deploy, port-forward, log-tail, cleanup on exit)
    preconditions:
      - sh: '[ -z "{{.NAMESPACE}}" ]'
        msg: "sk:dev does not support NAMESPACE. Use sk:run NAMESPACE={{.NAMESPACE}} instead."
    prompt: "This will deploy to {{.OC_SERVER}} namespace {{.DEFAULT_NAMESPACE}}. Continue?"
    cmds:
      - skaffold dev --namespace="{{.DEFAULT_NAMESPACE}}"

  _deploy:
    cmds:
      - |
        if [ -n "{{.NAMESPACE}}" ]; then
          skaffold run --namespace="{{.NAMESPACE}}" -f "overlays/custom-{{.NAMESPACE}}/skaffold.yaml"
        else
          DEPLOY_NAMESPACE="{{.DEFAULT_NAMESPACE}}" skaffold run --namespace="{{.DEFAULT_NAMESPACE}}"
        fi

  _resolve-namespace:
    # Resolves a profile name to its default namespace.
    # Usage: task sk:_resolve-namespace -- <profile>
    silent: true
    cmds:
      - |
        case "{{.CLI_ARGS}}" in
          stage)      echo "complytime-stage" ;;
          production) echo "complytime-prod" ;;
          *)          echo "{{.DEFAULT_NAMESPACE}}" ;;
        esac

  run:
    desc: "One-shot deploy (usage: task sk:run, task sk:run -- stage, or task sk:run NAMESPACE=foo)"
    vars:
      RESOLVED_NS:
        sh: |
          if [ -n "{{.NAMESPACE}}" ]; then
            echo "{{.NAMESPACE}}"
          elif [ -n "{{.CLI_ARGS}}" ]; then
            task sk:_resolve-namespace -- "{{.CLI_ARGS}}"
          fi
    preconditions:
      - sh: '[ -z "{{.NAMESPACE}}" ] || [ -z "{{.CLI_ARGS}}" ]'
        msg: "Cannot use NAMESPACE with a Skaffold profile. Use one or the other."
    prompt: "{{if .RESOLVED_NS}}This will deploy to {{.OC_SERVER}} namespace {{.RESOLVED_NS}} (base: {{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{.BASE}}{{end}}). Continue?{{else}}This will deploy to {{.OC_SERVER}} namespace {{.DEFAULT_NAMESPACE}}. Continue?{{end}}"
    cmds:
      - |
        if [ -n "{{.RESOLVED_NS}}" ]; then
          task sk:_generate-overlay NAMESPACE="{{.RESOLVED_NS}}" BASE="{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{.BASE}}{{end}}" APPCODE="{{.APPCODE}}"
        fi
      - task: _deploy
        vars:
          NAMESPACE: "{{.RESOLVED_NS}}"

  render:
    desc: "Render manifests to stdout (usage: task sk:render, task sk:render -- stage, or task sk:render NAMESPACE=foo)"
    vars:
      RESOLVED_NS:
        sh: |
          if [ -n "{{.NAMESPACE}}" ]; then
            echo "{{.NAMESPACE}}"
          elif [ -n "{{.CLI_ARGS}}" ]; then
            task sk:_resolve-namespace -- "{{.CLI_ARGS}}"
          fi
    preconditions:
      - sh: '[ -z "{{.NAMESPACE}}" ] || [ -z "{{.CLI_ARGS}}" ]'
        msg: "Cannot use NAMESPACE with a Skaffold profile. Use one or the other."
    cmds:
      - |
        if [ -n "{{.RESOLVED_NS}}" ]; then
          task sk:_generate-overlay NAMESPACE="{{.RESOLVED_NS}}" BASE="{{if .CLI_ARGS}}{{.CLI_ARGS}}{{else}}{{.BASE}}{{end}}" APPCODE="{{.APPCODE}}"
          skaffold render --namespace="{{.RESOLVED_NS}}" -f "overlays/custom-{{.RESOLVED_NS}}/skaffold.yaml"
        else
          skaffold render --namespace="{{.DEFAULT_NAMESPACE}}"
        fi

  render-all:
    desc: Render all Skaffold profiles to .rendered-manifests/ for scanning
    vars:
      RENDER_DIR: "{{.ROOT_DIR}}/.rendered-manifests"
    cmds:
      - rm -rf "{{.RENDER_DIR}}"
      - mkdir -p "{{.RENDER_DIR}}"
      - skaffold render --namespace="{{.DEFAULT_NAMESPACE}}" > "{{.RENDER_DIR}}/local.yaml"
      - task sk:_generate-overlay NAMESPACE=complytime-stage BASE=stage APPCODE="{{.APPCODE}}"
      - skaffold render --namespace=complytime-stage -f overlays/custom-complytime-stage/skaffold.yaml > "{{.RENDER_DIR}}/stage.yaml"
      - task sk:_generate-overlay NAMESPACE=complytime-prod BASE=production APPCODE="{{.APPCODE}}"
      - skaffold render --namespace=complytime-prod -f overlays/custom-complytime-prod/skaffold.yaml > "{{.RENDER_DIR}}/production.yaml"
      - echo "Rendered all profiles to {{.RENDER_DIR}}/"

  validate:
    desc: "Validate Skaffold profiles (render check; ENV_CHECK=1 to audit env vars; pass profile name to validate single profile)"
    vars:
      ENV_CHECK: '{{.ENV_CHECK | default "0"}}'
    cmds:
      - |
        env_check="{{.ENV_CHECK}}"
        profile="{{.CLI_ARGS}}"
        tmpdir=""
        cleanup() { [ -n "$tmpdir" ] && rm -rf "$tmpdir"; }
        trap cleanup EXIT

        if [ "$env_check" = "1" ]; then
          if ! command -v yq >/dev/null 2>&1; then
            echo "ERROR: ENV_CHECK=1 requires yq — run: task tools:install -- yq"
            exit 1
          fi
          tmpdir=$(mktemp -d)
        fi

        # Determine which profiles to render
        if [ -n "$profile" ]; then
          profiles="$profile"
        else
          profiles="local stage production"
        fi

        for p in $profiles; do
          case "$p" in
            local)
              echo "Rendering default (local)..." && skaffold render -v error > /dev/null
              ;;
            stage)
              task sk:_generate-overlay NAMESPACE=complytime-stage BASE=stage APPCODE="{{.APPCODE}}"
              echo "Rendering stage..."
              if [ "$env_check" = "1" ]; then
                skaffold render -v error -f overlays/custom-complytime-stage/skaffold.yaml > "$tmpdir/stage.yaml"
              else
                skaffold render -v error -f overlays/custom-complytime-stage/skaffold.yaml > /dev/null
              fi
              ;;
            production)
              task sk:_generate-overlay NAMESPACE=complytime-prod BASE=production APPCODE="{{.APPCODE}}"
              echo "Rendering production..."
              if [ "$env_check" = "1" ]; then
                skaffold render -v error -f overlays/custom-complytime-prod/skaffold.yaml > "$tmpdir/production.yaml"
              else
                skaffold render -v error -f overlays/custom-complytime-prod/skaffold.yaml > /dev/null
              fi
              ;;
            *)
              echo "ERROR: Unknown profile: $p (expected: local, stage, production)"
              exit 1
              ;;
          esac
        done

        echo "All profiles rendered successfully"

        # --- Optional env var audit ---
        if [ "$env_check" != "1" ]; then
          exit 0
        fi

        echo "Checking env vars..."
        errors=""
        for p in $profiles; do
          # Skip local — no env var audit needed for dev overlay
          [ "$p" = "local" ] && continue
          # Only audit profiles that were rendered to tmpdir
          [ ! -f "$tmpdir/${p}.yaml" ] && continue
          empty_vars=$(yq eval '
            select(.kind == "Deployment") |
            .metadata.name as $deploy |
            .spec.template.spec.containers[] |
            .name as $container |
            .env[] |
            select(.value == "" and (has("valueFrom") | not)) |
            $deploy + "/" + $container + ": " + .name
          ' "$tmpdir/${p}.yaml" | grep -v '^---$' || true)
          if [ -n "$empty_vars" ]; then
            errors="${errors}${errors:+\n}ERROR: ${p} has empty env vars that must be configured:\n$(echo "$empty_vars" | sed 's/^/  /')\n  Update: overlays/${p}/patches/"
          else
            echo "  ${p}: all env vars populated"
          fi
        done
        if [ -n "$errors" ]; then
          printf '\n%b\n' "$errors"
          exit 1
        fi

  lint:
    desc: "Verify rendered ConfigMap/Secret references match apply-sealed-secrets.sh"
    cmds:
      - |
        tmpdir=$(mktemp -d)
        cleanup() { rm -rf "$tmpdir"; }
        trap cleanup EXIT

        # Render stage and production profiles
        task sk:_generate-overlay NAMESPACE=complytime-stage BASE=stage APPCODE="{{.APPCODE}}"
        skaffold render -v error -f overlays/custom-complytime-stage/skaffold.yaml > "$tmpdir/stage.yaml"

        task sk:_generate-overlay NAMESPACE=complytime-prod BASE=production APPCODE="{{.APPCODE}}"
        skaffold render -v error -f overlays/custom-complytime-prod/skaffold.yaml > "$tmpdir/production.yaml"

        script="{{.ROOT_DIR}}/scripts/apply-sealed-secrets.sh"
        errors=""

        for profile in stage production; do
          # Extract configMapKeyRef references: configmap-name/key-name
          cm_refs=$(yq eval '
            select(.kind == "Deployment") |
            .spec.template.spec.containers[].env[] |
            select(.valueFrom.configMapKeyRef) |
            .valueFrom.configMapKeyRef.name + "/" + .valueFrom.configMapKeyRef.key
          ' "$tmpdir/${profile}.yaml" | grep -v '^---$' | sort -u || true)

          # Extract required secretKeyRef references (exclude optional: true)
          secret_refs=$(yq eval '
            select(.kind == "Deployment") |
            .spec.template.spec.containers[].env[] |
            select(.valueFrom.secretKeyRef) |
            select(.valueFrom.secretKeyRef.optional != true) |
            .valueFrom.secretKeyRef.name + "/" + .valueFrom.secretKeyRef.key
          ' "$tmpdir/${profile}.yaml" | grep -v '^---$' | sort -u || true)

          for ref in $cm_refs; do
            cm_name="${ref%%/*}"
            cm_key="${ref##*/}"
            # Check that script creates this ConfigMap
            if ! grep -q "oc create configmap ${cm_name}" "$script"; then
              errors="${errors}${errors:+\n}ERROR: ${profile}: ConfigMap '${cm_name}' referenced in manifests but not created by apply-sealed-secrets.sh"
              continue
            fi
            # Check that the key is included
            if ! grep -A 20 "oc create configmap ${cm_name}" "$script" | grep -qF -- "--from-literal=${cm_key}="; then
              errors="${errors}${errors:+\n}ERROR: ${profile}: ConfigMap '${cm_name}' missing key '${cm_key}' in apply-sealed-secrets.sh"
            fi
          done

          for ref in $secret_refs; do
            secret_name="${ref%%/*}"
            secret_key="${ref##*/}"
            # Check that script creates this Secret
            if ! grep -q "oc create secret generic ${secret_name}" "$script"; then
              errors="${errors}${errors:+\n}ERROR: ${profile}: Secret '${secret_name}' referenced in manifests but not created by apply-sealed-secrets.sh"
              continue
            fi
            # Check that the key is included
            if ! grep -A 20 "oc create secret generic ${secret_name}" "$script" | grep -qE -- "--from-literal=${secret_key}=|--from-file=${secret_key}="; then
              errors="${errors}${errors:+\n}ERROR: ${profile}: Secret '${secret_name}' missing key '${secret_key}' in apply-sealed-secrets.sh"
            fi
          done
        done

        if [ -n "$errors" ]; then
          echo "Lint sync check FAILED:"
          printf '%b\n' "$errors"
          exit 1
        fi
        echo "Lint sync check passed — all ConfigMap/Secret references match apply-sealed-secrets.sh"

  status:
    desc: Show pod status in the deployment namespace
    cmds:
      - oc get pods -n {{.NAMESPACE | default .DEFAULT_NAMESPACE}}

  delete:
    desc: "Delete deployed resources and PVCs — DESTRUCTIVE (usage: task sk:delete, task sk:delete -- stage, or task sk:delete NAMESPACE=foo)"
    vars:
      RESOLVED_NS:
        sh: |
          if [ -n "{{.NAMESPACE}}" ]; then
            echo "{{.NAMESPACE}}"
          elif [ -n "{{.CLI_ARGS}}" ]; then
            task sk:_resolve-namespace -- "{{.CLI_ARGS}}"
          fi
    prompt: "{{if .RESOLVED_NS}}This will DELETE resources in namespace {{.RESOLVED_NS}} on {{.OC_SERVER}} and remove overlays/custom-{{.RESOLVED_NS}}/. Continue?{{else}}This will DELETE resources in namespace {{.DEFAULT_NAMESPACE}} on {{.OC_SERVER}}. Continue?{{end}}"
    cmds:
      - |
        if [ -n "{{.RESOLVED_NS}}" ]; then
          OVERLAY_DIR="{{.ROOT_DIR}}/overlays/custom-{{.RESOLVED_NS}}"
          if [ ! -d "$OVERLAY_DIR" ]; then
            echo "ERROR: Custom overlay not found at $OVERLAY_DIR"
            echo "  Nothing to delete — was this namespace deployed with sk:run NAMESPACE={{.RESOLVED_NS}}?"
            exit 1
          fi
          oc project "{{.RESOLVED_NS}}" >/dev/null
          skaffold delete --namespace="{{.RESOLVED_NS}}" -f "overlays/custom-{{.RESOLVED_NS}}/skaffold.yaml"
          oc delete pvc --all -n "{{.RESOLVED_NS}}" --wait=false 2>/dev/null || true
          rm -rf "$OVERLAY_DIR"
          echo "Removed generated overlay at overlays/custom-{{.RESOLVED_NS}}/"
        else
          oc project "{{.DEFAULT_NAMESPACE}}" >/dev/null
          skaffold delete --namespace="{{.DEFAULT_NAMESPACE}}"
          PVCS=$(oc get pvc -n "{{.DEFAULT_NAMESPACE}}" -o name 2>/dev/null)
          if [ -n "$PVCS" ]; then
            echo "Deleting PVCs to reclaim disk..."
            oc delete pvc --all -n "{{.DEFAULT_NAMESPACE}}" --wait=false
            echo "PVCs deleted"
          else
            echo "No PVCs to clean up"
          fi
        fi
