stages:
  - validate
  - deploy-stage
  - deploy-production

.deploy-template: &deploy-template
  image: registry.access.redhat.com/ubi10/ubi-minimal
  tags:
    - itup-alm-x86
  before_script:
    - microdnf install -y --nodocs tar gzip jq && microdnf clean all
    # Bootstrap task binary with checksum verification from .tool_checksums.
    # This is the only tool installed via raw shell — everything else goes
    # through 'task tools:install-*'.
    - |
      TASK_VERSION=$(grep '^task/' .tool_checksums | head -1 | cut -d/ -f2)
      EXPECTED=$(grep "task/${TASK_VERSION}/linux/amd64" .tool_checksums | cut -d: -f2 | tr -d ' ')
      curl -fsSL -o /tmp/task.tar.gz \
        "https://github.com/go-task/task/releases/download/${TASK_VERSION}/task_linux_amd64.tar.gz"
      echo "${EXPECTED}  /tmp/task.tar.gz" | sha256sum -c -
      tar -xzf /tmp/task.tar.gz -C /usr/local/bin task
      rm -f /tmp/task.tar.gz
      task --version
    - task tools:install-deploy TOOLS_DIR=/usr/local/bin
    - ln -sf /usr/local/bin/oc /usr/local/bin/kubectl

validate:
  <<: *deploy-template
  stage: validate
  script:
    - task sk:validate

deploy-stage:
  <<: *deploy-template
  stage: deploy-stage
  when: manual
  variables:
    OPENSHIFT_SERVER_STAGE: "${OPENSHIFT_SERVER_STAGE}"
    OPENSHIFT_STAGE_TOKEN: "${OPENSHIFT_STAGE_TOKEN}"
  script:
    - |
      if [ -z "$OPENSHIFT_SERVER_STAGE" ] || [ -z "$OPENSHIFT_STAGE_TOKEN" ]; then
        echo "ERROR: OPENSHIFT_SERVER_STAGE and OPENSHIFT_STAGE_TOKEN must be set"
        exit 1
      fi
    - task sk:run --yes -- stage

deploy-production:
  <<: *deploy-template
  stage: deploy-production
  when: manual
  variables:
    OPENSHIFT_SERVER_PRODUCTION: "${OPENSHIFT_SERVER_PRODUCTION}"
    OPENSHIFT_PRODUCTION_TOKEN: "${OPENSHIFT_PRODUCTION_TOKEN}"
  script:
    - |
      if [ -z "$OPENSHIFT_SERVER_PRODUCTION" ] || [ -z "$OPENSHIFT_PRODUCTION_TOKEN" ]; then
        echo "ERROR: OPENSHIFT_SERVER_PRODUCTION and OPENSHIFT_PRODUCTION_TOKEN must be set"
        exit 1
      fi
    - task sk:run --yes -- production
