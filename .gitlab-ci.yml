variables:
  CI_ENV_STAGE: stage
  CI_ENV_PRODUCTION: production
  # Skaffold runtime settings (see also skaffold.env for local dev)
  SKAFFOLD_COLLECT_METRICS: "false"
  SKAFFOLD_CHECK_CLUSTER_NODE_PLATFORMS: "false"

stages:
  - validate
  - lifecycle
  - deploy-stage
  - deploy-production

.deploy-template: &deploy-template
  image: registry.access.redhat.com/ubi10/ubi-minimal
  tags:
    - itup-alm-x86
  before_script:
    - microdnf install -y --nodocs tar gzip jq && microdnf clean all
    # Bootstrap task binary with checksum verification from .tool_checksums.
    # This is the only tool installed via raw shell — everything else goes
    # through 'task tools:install -- <tool>'.
    - |
      TASK_VERSION=$(grep '^task/' .tool_checksums | head -1 | cut -d/ -f2)
      EXPECTED=$(grep "task/${TASK_VERSION}/linux/amd64" .tool_checksums | cut -d: -f2 | tr -d ' ')
      curl -fsSL -o /tmp/task.tar.gz \
        "https://github.com/go-task/task/releases/download/${TASK_VERSION}/task_linux_amd64.tar.gz"
      echo "${EXPECTED}  /tmp/task.tar.gz" | sha256sum -c -
      tar -xzf /tmp/task.tar.gz -C /usr/local/bin task
      rm -f /tmp/task.tar.gz
      task --version
    - task tools:install-deploy TOOLS_DIR=/usr/local/bin
    - ln -sf /usr/local/bin/oc /usr/local/bin/kubectl
    - |
      if [ -n "${OPENSHIFT_TOKEN:-}" ] && [ -n "${OPENSHIFT_SERVER:-}" ]; then
        oc login --token="$OPENSHIFT_TOKEN" --server="$OPENSHIFT_SERVER"
      fi

validate-stage:
  <<: *deploy-template
  stage: validate
  environment:
    name: $CI_ENV_STAGE
  script:
    - task sk:validate ENV_CHECK=1 -- stage
    - task sk:lint

validate-production:
  <<: *deploy-template
  stage: validate
  environment:
    name: $CI_ENV_PRODUCTION
  script:
    - task sk:validate ENV_CHECK=1 -- production
    - task sk:lint

.validate-server:
  <<: *deploy-template
  stage: validate
  rules:
    - if: $OPENSHIFT_SERVER && $OPENSHIFT_TOKEN
      when: on_success
  script:
    - oc login --token="$OPENSHIFT_TOKEN" --server="$OPENSHIFT_SERVER"
    - |
      if [ -n "${DEPLOY_NAMESPACE:-}" ]; then
        NS="$DEPLOY_NAMESPACE"
      else
        NS=$(task sk:_resolve-namespace -- "$VALIDATE_PROFILE")
      fi
      task sk:_generate-overlay NAMESPACE="$NS" BASE="$VALIDATE_PROFILE"
      skaffold render --namespace="$NS" -f "overlays/custom-${NS}/skaffold.yaml" | oc apply --dry-run=server -f -

validate-server-stage:
  extends: .validate-server
  needs:
    - validate-stage
  environment:
    name: $CI_ENV_STAGE
  variables:
    VALIDATE_PROFILE: stage

validate-server-production:
  extends: .validate-server
  needs:
    - validate-production
  environment:
    name: $CI_ENV_PRODUCTION
  variables:
    VALIDATE_PROFILE: production

# --- Lifecycle: manual ops jobs (independent of deploy) ---

# Show pod status for the target environment.
status-stage:
  <<: *deploy-template
  stage: lifecycle
  rules:
    - if: $OPENSHIFT_SERVER && $OPENSHIFT_TOKEN
      when: manual
  needs:
    - validate-server-stage
  environment:
    name: $CI_ENV_STAGE
  script:
    - |
      if [ -n "${DEPLOY_NAMESPACE:-}" ]; then
        task sk:status NAMESPACE="$DEPLOY_NAMESPACE"
      else
        task sk:status -- stage
      fi

status-production:
  <<: *deploy-template
  stage: lifecycle
  rules:
    - if: $OPENSHIFT_SERVER && $OPENSHIFT_TOKEN
      when: manual
  needs:
    - validate-server-production
  environment:
    name: $CI_ENV_PRODUCTION
  script:
    - |
      if [ -n "${DEPLOY_NAMESPACE:-}" ]; then
        task sk:status NAMESPACE="$DEPLOY_NAMESPACE"
      else
        task sk:status -- production
      fi

# Rolling restart of all deployments, then wait for rollout to complete.
restart-stage:
  <<: *deploy-template
  stage: lifecycle
  rules:
    - if: $OPENSHIFT_SERVER && $OPENSHIFT_TOKEN
      when: manual
  needs:
    - validate-server-stage
  environment:
    name: $CI_ENV_STAGE
  script:
    - |
      if [ -n "${DEPLOY_NAMESPACE:-}" ]; then
        task sk:restart --yes NAMESPACE="$DEPLOY_NAMESPACE"
      else
        task sk:restart --yes -- stage
      fi

restart-production:
  <<: *deploy-template
  stage: lifecycle
  rules:
    - if: $OPENSHIFT_SERVER && $OPENSHIFT_TOKEN
      when: manual
  needs:
    - validate-server-production
  environment:
    name: $CI_ENV_PRODUCTION
  script:
    - |
      if [ -n "${DEPLOY_NAMESPACE:-}" ]; then
        task sk:restart --yes NAMESPACE="$DEPLOY_NAMESPACE"
      else
        task sk:restart --yes -- production
      fi

# Render final Kustomize/Skaffold manifests to the job log for inspection.
render-stage:
  <<: *deploy-template
  stage: lifecycle
  rules:
    - if: $OPENSHIFT_SERVER && $OPENSHIFT_TOKEN
      when: manual
  needs:
    - validate-server-stage
  environment:
    name: $CI_ENV_STAGE
  script:
    - |
      if [ -n "${DEPLOY_NAMESPACE:-}" ]; then
        task sk:render NAMESPACE="$DEPLOY_NAMESPACE" BASE=stage
      else
        task sk:render -- stage
      fi

render-production:
  <<: *deploy-template
  stage: lifecycle
  rules:
    - if: $OPENSHIFT_SERVER && $OPENSHIFT_TOKEN
      when: manual
  needs:
    - validate-server-production
  environment:
    name: $CI_ENV_PRODUCTION
  script:
    - |
      if [ -n "${DEPLOY_NAMESPACE:-}" ]; then
        task sk:render NAMESPACE="$DEPLOY_NAMESPACE" BASE=production
      else
        task sk:render -- production
      fi

# Delete all deployed resources, PVCs, and generated overlays. Destructive.
teardown-stage:
  <<: *deploy-template
  stage: lifecycle
  rules:
    - if: $OPENSHIFT_SERVER && $OPENSHIFT_TOKEN
      when: manual
  needs:
    - validate-server-stage
  environment:
    name: $CI_ENV_STAGE
  script:
    - |
      if [ -n "${DEPLOY_NAMESPACE:-}" ]; then
        task sk:delete --yes NAMESPACE="$DEPLOY_NAMESPACE" BASE=stage
      else
        task sk:delete --yes -- stage
      fi
  artifacts:
    paths:
      - overlays/custom-*
    expire_in: 7 days
    when: always

teardown-production:
  <<: *deploy-template
  stage: lifecycle
  rules:
    - if: $OPENSHIFT_SERVER && $OPENSHIFT_TOKEN
      when: manual
  needs:
    - validate-server-production
  environment:
    name: $CI_ENV_PRODUCTION
  script:
    - |
      if [ -n "${DEPLOY_NAMESPACE:-}" ]; then
        task sk:delete --yes NAMESPACE="$DEPLOY_NAMESPACE" BASE=production
      else
        task sk:delete --yes -- production
      fi
  artifacts:
    paths:
      - overlays/custom-*
    expire_in: 7 days
    when: always

# --- Deploy: manual deployment jobs ---

# Deploy the application stack via Skaffold (Kustomize + oc apply).
deploy-stage:
  <<: *deploy-template
  stage: deploy-stage
  rules:
    - if: $OPENSHIFT_SERVER && $OPENSHIFT_TOKEN
      when: manual
  needs:
    - validate-server-stage
  environment:
    name: $CI_ENV_STAGE
  script:
    - |
      if [ -n "${DEPLOY_NAMESPACE:-}" ]; then
        task sk:run --yes NAMESPACE="$DEPLOY_NAMESPACE" BASE=stage
      else
        task sk:run --yes -- stage
      fi
  artifacts:
    paths:
      - overlays/custom-*
    expire_in: 7 days
    when: always

deploy-production:
  <<: *deploy-template
  stage: deploy-production
  rules:
    - if: $OPENSHIFT_SERVER && $OPENSHIFT_TOKEN
      when: manual
  needs:
    - validate-server-production
  environment:
    name: $CI_ENV_PRODUCTION
  script:
    - |
      if [ -n "${DEPLOY_NAMESPACE:-}" ]; then
        task sk:run --yes NAMESPACE="$DEPLOY_NAMESPACE" BASE=production
      else
        task sk:run --yes -- production
      fi
  artifacts:
    paths:
      - overlays/custom-*
    expire_in: 7 days
    when: always
