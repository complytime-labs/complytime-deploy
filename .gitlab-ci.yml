stages:
  - validate
  - deploy-stage
  - deploy-production

.deploy-template: &deploy-template
  image: registry.access.redhat.com/ubi10/ubi-minimal
  tags:
    - itup-alm-x86
  before_script:
    - microdnf install -y --nodocs tar gzip jq && microdnf clean all
    # Bootstrap task binary with checksum verification from .tool_checksums.
    # This is the only tool installed via raw shell — everything else goes
    # through 'task tools:install-*'.
    - |
      TASK_VERSION=$(grep '^task/' .tool_checksums | head -1 | cut -d/ -f2)
      EXPECTED=$(grep "task/${TASK_VERSION}/linux/amd64" .tool_checksums | cut -d: -f2 | tr -d ' ')
      curl -fsSL -o /tmp/task.tar.gz \
        "https://github.com/go-task/task/releases/download/${TASK_VERSION}/task_linux_amd64.tar.gz"
      echo "${EXPECTED}  /tmp/task.tar.gz" | sha256sum -c -
      tar -xzf /tmp/task.tar.gz -C /usr/local/bin task
      rm -f /tmp/task.tar.gz
      task --version
    - task tools:install-deploy TOOLS_DIR=/usr/local/bin
    - ln -sf /usr/local/bin/oc /usr/local/bin/kubectl

validate:
  <<: *deploy-template
  stage: validate
  script:
    - task sk:validate

.validate-server:
  <<: *deploy-template
  stage: validate
  allow_failure: true
  script:
    - |
      if [ -z "$VALIDATE_SERVER" ] || [ -z "$VALIDATE_TOKEN" ]; then
        echo "Skipping: VALIDATE_SERVER or VALIDATE_TOKEN not set"
        exit 0
      fi
    - oc login --token="$VALIDATE_TOKEN" --server="$VALIDATE_SERVER"
    - skaffold render -p "$VALIDATE_PROFILE" | oc apply --dry-run=server -f -

validate-server-stage:
  extends: .validate-server
  environment:
    name: stage
  variables:
    VALIDATE_SERVER: "$OPENSHIFT_SERVER"
    VALIDATE_TOKEN: "$OPENSHIFT_TOKEN"
    VALIDATE_PROFILE: stage

validate-server-production:
  extends: .validate-server
  environment:
    name: production
  variables:
    VALIDATE_SERVER: "$OPENSHIFT_SERVER"
    VALIDATE_TOKEN: "$OPENSHIFT_TOKEN"
    VALIDATE_PROFILE: production

deploy-stage:
  <<: *deploy-template
  stage: deploy-stage
  when: manual
  environment:
    name: stage
  script:
    - |
      if [ -z "$OPENSHIFT_SERVER" ] || [ -z "$OPENSHIFT_TOKEN" ]; then
        echo "ERROR: OPENSHIFT_SERVER and OPENSHIFT_TOKEN must be set (scoped to stage environment)"
        exit 1
      fi
    - task sk:run --yes -- stage

deploy-production:
  <<: *deploy-template
  stage: deploy-production
  when: manual
  environment:
    name: production
  script:
    - |
      if [ -z "$OPENSHIFT_SERVER" ] || [ -z "$OPENSHIFT_TOKEN" ]; then
        echo "ERROR: OPENSHIFT_SERVER and OPENSHIFT_TOKEN must be set (scoped to production environment)"
        exit 1
      fi
    - task sk:run --yes -- production
