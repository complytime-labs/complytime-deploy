stages:
  - validate
  - deploy-stage
  - deploy-production

.deploy-template: &deploy-template
  image: quay.io/fedora/fedora
  tags:
    - itup-alm-x86
  variables:
    KUSTOMIZE_VERSION: "v5.6.0"
    SKAFFOLD_VERSION: "v2.18.3"
  before_script:
    - |
      echo "zchunk=False" >> /etc/dnf/dnf.conf
      dnf clean all
      dnf install -y wget tar jq
      # TODO: Snag https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/openshift-client-linux.tar.gz, validate against https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/sha256sum.txt and https://mirror.openshift.com/pub/openshift-v4/x86_64/clients/ocp/stable/sha256sum.txt.gpg
      tar -xf oc.tar
      mkdir -p /usr/local/bin
      mv oc /usr/local/bin/oc
      chmod +x /usr/local/bin/oc
      rm -rf oc.tar
    - oc version
    - |
      wget -qO kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
      tar -xzf kustomize.tar.gz
      mv kustomize /usr/local/bin/
      rm -f kustomize.tar.gz
    - |
      wget -qO /usr/local/bin/skaffold "https://storage.googleapis.com/skaffold/releases/${SKAFFOLD_VERSION}/skaffold-linux-amd64"
      chmod +x /usr/local/bin/skaffold
    - ln -sf /usr/local/bin/oc /usr/local/bin/kubectl

validate:
  <<: *deploy-template
  stage: validate
  script:
    # Render-only (no cluster credentials in this stage).
    # Run 'task sk:validate' locally for server-side dry-run.
    - skaffold render > /dev/null
    - skaffold render -p stage > /dev/null
    - skaffold render -p production > /dev/null

deploy-stage:
  <<: *deploy-template
  stage: deploy-stage
  when: manual
  variables:
    OPENSHIFT_SERVER_STAGE: "${OPENSHIFT_SERVER_STAGE}"
    OPENSHIFT_STAGE_TOKEN: "${OPENSHIFT_STAGE_TOKEN}"
  script:
    - |
      if [ -z "$OPENSHIFT_SERVER_STAGE" ] || [ -z "$OPENSHIFT_STAGE_TOKEN" ]; then
        echo "ERROR: OPENSHIFT_SERVER_STAGE and OPENSHIFT_STAGE_TOKEN must be set"
        exit 1
      fi
    - skaffold run -p stage

deploy-production:
  <<: *deploy-template
  stage: deploy-production
  when: manual
  variables:
    OPENSHIFT_SERVER_PRODUCTION: "${OPENSHIFT_SERVER_PRODUCTION}"
    OPENSHIFT_PRODUCTION_TOKEN: "${OPENSHIFT_PRODUCTION_TOKEN}"
  script:
    - |
      if [ -z "$OPENSHIFT_SERVER_PRODUCTION" ] || [ -z "$OPENSHIFT_PRODUCTION_TOKEN" ]; then
        echo "ERROR: OPENSHIFT_SERVER_PRODUCTION and OPENSHIFT_PRODUCTION_TOKEN must be set"
        exit 1
      fi
    - skaffold run -p production
