# ComplyTime task runner — run 'task' to see available commands.
# Requires: https://taskfile.dev
version: "3"

dotenv:
  - skaffold.env

silent: true

includes:
  tools:
    taskfile: .taskfiles/tools.yml
  sk:
    taskfile: .taskfiles/sk.yml
  crc:
    taskfile: .taskfiles/crc.yml
  quadlet:
    taskfile: .taskfiles/quadlet.yml
  unit:
    taskfile: .taskfiles/unit.yml
  integration:
    taskfile: .taskfiles/integration.yml

vars:
  TEST_DIR: '{{.TEST_DIR | default ".test-output"}}'
  DEFAULT_NAMESPACE: '{{.DEFAULT_NAMESPACE | default "complytime-dev"}}'
  NAMESPACE: '{{.NAMESPACE | default ""}}'

env:
  SKAFFOLD_COLLECT_METRICS: "false"
  DOCKER_HOST:
    sh: |
      if [ -n "${DOCKER_HOST:-}" ]; then
        echo "$DOCKER_HOST"
      elif command -v docker &>/dev/null; then
        docker context inspect --format '{{ "{{" }}.Endpoints.docker.Host{{ "}}" }}' 2>/dev/null || echo ""
      elif command -v podman &>/dev/null; then
        echo "unix://${XDG_RUNTIME_DIR:-/run/user/$(id -u)}/podman/podman.sock"
      fi

tasks:
  default:
    silent: true
    cmds:
      - task --list
