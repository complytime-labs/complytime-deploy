executor: get-oidc-token
input:
  keycloak_host: "localhost"
  keycloak_port: "8180"
  client_id: "beacon-test"
  client_secret: "beacon-test-secret" # checkov:skip=CKV_SECRET_6:test fixture credential for local Keycloak dev instance
  timeout: "30"

steps:
  - type: exec
    script: |
      DEADLINE=$(($(date +%s) + {{.input.timeout}}))
      ATTEMPT=0
      while [ $(date +%s) -lt $DEADLINE ]; do
        ATTEMPT=$((ATTEMPT + 1))
        RESPONSE=$(curl -s -w '\n%{http_code}' \
          -X POST \
          "http://{{.input.keycloak_host}}:{{.input.keycloak_port}}/realms/complytime/protocol/openid-connect/token" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "grant_type=client_credentials&client_id={{.input.client_id}}&client_secret={{.input.client_secret}}" \
          2>/dev/null) || RESPONSE=$'\n000'
        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')
        if [ "$HTTP_CODE" = "200" ]; then
          TOKEN=$(echo "$BODY" | jq -r '.access_token // empty')
          if [ -n "$TOKEN" ]; then
            echo "ACCESS_TOKEN=${TOKEN}"
            exit 0
          fi
        fi
        REMAINING=$((DEADLINE - $(date +%s)))
        echo "  get-oidc-token attempt $ATTEMPT: HTTP $HTTP_CODE (${REMAINING}s remaining)" >&2
        sleep 2
      done
      echo "ERROR: failed to get token after $ATTEMPT attempts" >&2
      exit 1
    assertions:
      - result.code ShouldEqual 0
      - result.systemout ShouldContainSubstring "ACCESS_TOKEN="
    vars:
      access_token:
        from: result.systemout
        regex: "ACCESS_TOKEN=(\\S+)"

output:
  access_token: "{{.access_token}}"
