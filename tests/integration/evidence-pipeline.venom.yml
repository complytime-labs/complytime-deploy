name: Evidence pipeline end-to-end
vars:
  collector_host: "collector.complytime-dev.svc"
  loki_host: "loki.complytime-dev.svc"
  rustfs_host: "rustfs.complytime-dev.svc"
  webhook_port: "8088"
  loki_port: "3100"
  s3_port: "9000"
  s3_bucket: "complytime-evidence"
  s3_obj_dir: "local"
  ca_cert: ".test-output/service-ca.crt"
  catalog_id: "repo-branch-protection"

testcases:
  - name: Collector webhook is reachable
    steps:
      - type: http
        url: "https://{{.collector_host}}:{{.webhook_port}}/eventreceiver/healthcheck"
        method: GET
        tls_root_ca: "{{.ca_cert}}"
        resolve:
          - "{{.collector_host}}:{{.webhook_port}}:127.0.0.1"
        assertions:
          - result.statuscode ShouldEqual 200

  - name: "pull-request-enforcement: ingest and verify"
    steps:
      - type: post-evidence
        control_id: "pull-request-enforcement"
        requirement_id: "require-pull-request"
        catalog_id: "{{.catalog_id}}"
        collector_host: "{{.collector_host}}"
        webhook_port: "{{.webhook_port}}"
        ca_cert: "{{.ca_cert}}"
        assertions:
          - result.status_code ShouldEqual "200"
      - type: poll-loki
        query: '{policy_rule_id="pull-request-enforcement"}'
        loki_host: "{{.loki_host}}"
        loki_port: "{{.loki_port}}"
        ca_cert: "{{.ca_cert}}"
        assertions:
          - result.log_line ShouldNotBeEmpty
      - type: poll-s3
        rustfs_host: "{{.rustfs_host}}"
        s3_port: "{{.s3_port}}"
        bucket: "{{.s3_bucket}}"
        prefix: "{{.s3_obj_dir}}/pull-request-enforcement/"
        ca_cert: "{{.ca_cert}}"
        assertions:
          - result.keys ShouldContainSubstring "evidence_"

  - name: "approval-requirements: ingest and verify"
    steps:
      - type: post-evidence
        control_id: "approval-requirements"
        requirement_id: "require-approval"
        catalog_id: "{{.catalog_id}}"
        collector_host: "{{.collector_host}}"
        webhook_port: "{{.webhook_port}}"
        ca_cert: "{{.ca_cert}}"
        assertions:
          - result.status_code ShouldEqual "200"
      - type: poll-loki
        query: '{policy_rule_id="approval-requirements"}'
        loki_host: "{{.loki_host}}"
        loki_port: "{{.loki_port}}"
        ca_cert: "{{.ca_cert}}"
        assertions:
          - result.log_line ShouldNotBeEmpty
      - type: poll-s3
        rustfs_host: "{{.rustfs_host}}"
        s3_port: "{{.s3_port}}"
        bucket: "{{.s3_bucket}}"
        prefix: "{{.s3_obj_dir}}/approval-requirements/"
        ca_cert: "{{.ca_cert}}"
        assertions:
          - result.keys ShouldContainSubstring "evidence_"

  - name: "force-push-restriction: ingest and verify"
