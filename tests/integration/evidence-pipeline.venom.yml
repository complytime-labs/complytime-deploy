  - name: "admin-bypass-prevention: ingest and verify"
    steps:
      - type: post-evidence
        control_id: "admin-bypass-prevention"
        requirement_id: "prevent-admin-bypass"
        catalog_id: "{{.catalog_id}}"
        collector_host: "{{.collector_host}}"
        webhook_port: "{{.webhook_port}}"
        ca_cert: "{{.ca_cert}}"
        assertions:
          - result.status_code ShouldEqual "200"
      - type: poll-loki
        query: '{policy_rule_id="admin-bypass-prevention"}'
        loki_host: "{{.loki_host}}"
        loki_port: "{{.loki_port}}"
        ca_cert: "{{.ca_cert}}"
        assertions:
          - result.log_line ShouldNotBeEmpty
      - type: poll-s3
        rustfs_host: "{{.rustfs_host}}"
        s3_port: "{{.s3_port}}"
        bucket: "{{.s3_bucket}}"
        prefix: "{{.s3_obj_dir}}/admin-bypass-prevention/"
        ca_cert: "{{.ca_cert}}"
        assertions:
          - result.keys ShouldContainSubstring "evidence_"

  - name: "code-owner-enforcement: ingest and verify"
    steps:
      - type: post-evidence
