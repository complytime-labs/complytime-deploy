# Stage collector env vars — S3 config and OIDC issuer.
# OIDC_ISSUER_URL defaults to empty here. Set it via GitLab CI variable
# (Settings > CI/CD > Variables, scope: stage) — post-deploy.sh injects it.
# Example: https://sso.example.com/realms/complytime
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
spec:
  template:
    spec:
      containers:
        - name: collector
          env:
            - name: OIDC_ISSUER_URL
              value: ""
            - name: LOKI_HOST
              value: "loki"
            - name: S3_ENDPOINT
              value: ""
            - name: S3_BUCKETNAME
              value: "sw-s3-hyperproof"
            - name: S3_OBJ_DIR
              value: "test"
            - name: AWS_REGION
              value: "us-east-2"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_SECRET_ACCESS_KEY
