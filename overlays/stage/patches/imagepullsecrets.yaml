# Adds quay-io-pull-secret for private Quay images.
# Create the secret first: oc create secret docker-registry quay-io-pull-secret ...
# Or seal it as a SealedSecret (see sealed-secrets/README.md).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
spec:
  template:
    spec:
      imagePullSecrets:
        - name: quay-io-pull-secret
