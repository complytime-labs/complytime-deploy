# Stage Grafana env vars — OIDC authentication + root URL, login form disabled.
# Dynamic values (client ID, auth URLs, root URL, admin password) are
# injected from the grafana-env ConfigMap and grafana-admin-secret Secret,
# created by apply-sealed-secrets.sh from GitLab CI variables.
# Set CI variables in GitLab CI (Settings > CI/CD > Variables, scope: stage).
# Admin break-glass login: append ?disableAutoLogin=true to the Grafana login URL
# (e.g. https://<grafana-host>/login?disableAutoLogin=true) to bypass OIDC auto-login
# and show the username/password form. Use the GF_SECURITY_ADMIN_PASSWORD credential.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  template:
    spec:
      containers:
        - name: grafana
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
            - name: GF_AUTH_OAUTH_AUTO_LOGIN
              value: "true"
            - name: GF_SERVER_PROTOCOL
              value: "https"
            - name: GF_SERVER_CERT_FILE
              value: "/etc/tls/tls.crt"
            - name: GF_SERVER_CERT_KEY
              value: "/etc/tls/tls.key"
            - name: GF_SERVER_ROOT_URL
              value: null
              valueFrom:
                configMapKeyRef:
                  name: grafana-env
                  key: GF_SERVER_ROOT_URL
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: null
              valueFrom:
                configMapKeyRef:
                  name: grafana-env
                  key: GF_AUTH_GENERIC_OAUTH_ENABLED
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: "Red Hat SSO"
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_SIGN_UP
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: null
              valueFrom:
                configMapKeyRef:
                  name: grafana-env
                  key: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grafana-oidc-secret
                  key: client_secret
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: "openid email profile offline_access roles"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: null
              valueFrom:
                configMapKeyRef:
                  name: grafana-env
                  key: GF_AUTH_GENERIC_OAUTH_AUTH_URL
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: null
              valueFrom:
                configMapKeyRef:
                  name: grafana-env
                  key: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: null
              valueFrom:
                configMapKeyRef:
                  name: grafana-env
                  key: GF_AUTH_GENERIC_OAUTH_API_URL
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "contains(roles[*], 'admin') && 'Admin' || contains(roles[*], 'editor') && 'Editor' || 'Viewer'"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_STRICT
              value: "false"
            - name: GF_AUTH_GENERIC_OAUTH_EMAIL_ATTRIBUTE_PATH
              value: "email"
            - name: GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH
              value: "username"
            - name: GF_AUTH_GENERIC_OAUTH_NAME_ATTRIBUTE_PATH
              value: "full_name"
            - name: GF_AUTH_GENERIC_OAUTH_USE_REFRESH_TOKEN
              value: "true"
            # Signout redirect: set this CI variable to the SSO logout endpoint.
            # Format for Keycloak/RHSSO:
            #   https://<sso-host>/realms/<realm>/protocol/openid-connect/logout?post_logout_redirect_uri=<grafana-root-url>
            # The post_logout_redirect_uri must be URL-encoded and registered
            # in the SSO client's postLogoutRedirectUris.
            - name: GF_AUTH_SIGNOUT_REDIRECT_URL
              value: null
              valueFrom:
                configMapKeyRef:
                  name: grafana-env
                  key: GF_AUTH_SIGNOUT_REDIRECT_URL
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-secret
                  key: admin_password
