# Production collector env vars — S3 config and OIDC issuer.
# OIDC_ISSUER_URL and S3_ENDPOINT are injected from the collector-env ConfigMap,
# which is created by apply-sealed-secrets.sh from GitLab CI variables.
# Set both in GitLab CI (Settings > CI/CD > Variables, scope: production).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
spec:
  template:
    spec:
      containers:
        - name: collector
          env:
            - name: OIDC_ISSUER_URL
              value: null
              valueFrom:
                configMapKeyRef:
                  name: collector-env
                  key: OIDC_ISSUER_URL
            - name: LOKI_HOST
              value: "loki"
            - name: S3_ENDPOINT
              value: null
              valueFrom:
                configMapKeyRef:
                  name: collector-env
                  key: S3_ENDPOINT
            - name: S3_BUCKETNAME
              value: "sw-s3-hyperproof"
            - name: S3_OBJ_DIR
              value: "production"
            - name: AWS_REGION
              value: "us-east-2"
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: AWS_SECRET_ACCESS_KEY
