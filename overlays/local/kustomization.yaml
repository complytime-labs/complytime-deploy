# Local development overlay for OpenShift Local (CRC).
# Inherits all base manifests, then:
#   - Sets namespace to complytime-dev
#   - Uses base images (to test a local image, see "Testing Local Images" in README)
#   - Reduces resource limits for laptop
#   - Changes PVC access mode to ReadWriteOnce (CRC hostpath)
#   - Replaces collector config (OIDC auth on all receivers, debug exporter)
#   - Skips Grafana→Loki TLS verification
#   - Enables anonymous Grafana access (Admin role)
#   - Deploys Keycloak OIDC provider (complytime realm with test clients)
#   - Adds initContainer to collector to wait for Keycloak before starting
#   - Adds Routes for local browser access
#   - Adds RustFS for local S3 evidence export
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: complytime-dev

resources:
  - ../../base
  - routes.yaml
  - rustfs/
  - keycloak/

patches:
  - path: patches/resources.yaml
  - path: patches/pvcs.yaml
  - path: patches/grafana-datasource.yaml
  - path: patches/grafana-auth.yaml
  - path: patches/probes.yaml
  - path: patches/collector-env.yaml
  - path: patches/collector-oidc-env.yaml
  - path: patches/collector-init-keycloak.yaml

configMapGenerator:
  - name: collector-config
    behavior: replace
    files:
      - otel-collector.yaml=configs/collector-oidc.yaml
