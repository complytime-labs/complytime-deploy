# Keycloak — OIDC identity provider for integration testing (Apache 2.0).
# Runs in dev mode with realm auto-import. Ephemeral H2 database resets on restart.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:26.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          args: ["start-dev", "--import-realm"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: "admin"
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              value: "admin"
            - name: KC_HTTP_PORT
              value: "8080"
            # Force issuer URL to the in-cluster service name so JWT iss claims
            # match the collector's OIDC issuer_url, regardless of how clients
            # reach Keycloak (port-forward, route, etc.).
            - name: KC_HOSTNAME
              value: "http://keycloak:8080"
            - name: KC_HOSTNAME_STRICT
              value: "false"
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/data/import
              readOnly: true
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /realms/complytime
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /realms/complytime
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
      volumes:
        - name: realm
          configMap:
            name: keycloak-realm
        - name: tmp
          emptyDir: {}
