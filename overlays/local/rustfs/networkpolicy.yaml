# RustFS ingress — allows Collector (S3 export) and in-namespace Jobs
# (bucket creation) to reach the S3 API on port 9000.
# No Route exists for RustFS; it is only accessed in-cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-rustfs-ingress
spec:
  podSelector:
    matchLabels:
      app: rustfs
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9000
