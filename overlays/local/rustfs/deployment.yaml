# RustFS — S3-compatible object storage for local development (Apache 2.0).
# Same S3 API, same ports (9000/9001).
# Image UID 10001 is overridden by OpenShift's namespace UID range via SCC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rustfs
  template:
    metadata:
      labels:
        app: rustfs
    spec:
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: rustfs
        image: docker.io/rustfs/rustfs@sha256:d441111efe3af5bbd6e29eba7cd124f96bb7d49a0612390907f9216d5f970382 # v1.0.0-beta.3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        args: ["server", "/data", "--console-address", ":9001"]
        ports:
          - containerPort: 9000
            name: s3
          - containerPort: 9001
            name: console
        env:
          - name: RUSTFS_ACCESS_KEY
            value: "rustfsadmin"
          - name: RUSTFS_SECRET_KEY
            value: "rustfsadmin"
        volumeMounts:
          - name: data
            mountPath: /data
        readinessProbe:
          httpGet:
            path: /rustfs/health/ready
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: rustfs-storage
