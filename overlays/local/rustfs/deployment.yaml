# RustFS — S3-compatible object storage for local development (Apache 2.0).
# Same S3 API, same ports (9000/9001).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rustfs
  template:
    metadata:
      labels:
        app: rustfs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: rustfs
        image: docker.io/rustfs/rustfs:latest
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        args: ["server", "/data", "--console-address", ":9001"]
        ports:
          - containerPort: 9000
            name: s3
          - containerPort: 9001
            name: console
        env:
          - name: RUSTFS_ROOT_USER
            value: "rustfsadmin"
          - name: RUSTFS_ROOT_PASSWORD
            value: "rustfsadmin"
        volumeMounts:
          - name: data
            mountPath: /data
        readinessProbe:
          httpGet:
            path: /rustfs/health/ready
            port: 9000
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "250m"
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: rustfs-storage
