# RustFS service — exposes S3 API and web console.
apiVersion: v1
kind: Service
metadata:
  name: rustfs
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: rustfs-tls
spec:
  selector:
    app: rustfs
  ports:
    - name: s3
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
