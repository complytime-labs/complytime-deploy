# Creates the complytime-evidence bucket in RustFS on first deploy.
# Uses curl + S3 API directly — no external CLI tool needed.
apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-create-bucket
spec:
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: wait-for-rustfs
        image: registry.access.redhat.com/ubi10/ubi-minimal@sha256:2c20ac20ca1ecbbbd583603feabd9cc51e7e8ea5a82e5088e20a9494794b2574
        command: ['sh', '-c', 'until curl -sf --cacert /etc/ssl/certs/service-ca.crt https://rustfs:9000/health; do sleep 2; done']
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: service-ca
            mountPath: /etc/ssl/certs/service-ca.crt
            subPath: service-ca.crt
            readOnly: true
      containers:
      - name: create-bucket
        image: registry.access.redhat.com/ubi10/ubi-minimal@sha256:2c20ac20ca1ecbbbd583603feabd9cc51e7e8ea5a82e5088e20a9494794b2574
        command:
          - /bin/sh
          - -c
          - |
            curl -sf --cacert /etc/ssl/certs/service-ca.crt -X PUT https://rustfsadmin:rustfsadmin@rustfs:9000/complytime-evidence || true
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: service-ca
            mountPath: /etc/ssl/certs/service-ca.crt
            subPath: service-ca.crt
            readOnly: true
      volumes:
      - name: service-ca
        configMap:
          name: service-ca-bundle
  backoffLimit: 3
