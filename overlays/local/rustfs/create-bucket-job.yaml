# Creates the complytime-evidence bucket in RustFS on first deploy.
# Uses the rustfs/rc client for proper S3-authenticated bucket creation.
apiVersion: batch/v1
kind: Job
metadata:
  name: rustfs-create-bucket
spec:
  template:
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
      - name: wait-for-rustfs
        image: docker.io/rustfs/rc@sha256:ca85fbee9f96425446915cb08b41d5e246c782eeb3f6a00d3b8294fce5219891
        command:
          - /bin/sh
          - -c
          - |
            until rc alias set local http://rustfs:9000 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" 2>/dev/null; do
              echo "waiting for rustfs..."
              sleep 2
            done
        env:
          - name: AWS_ACCESS_KEY_ID
            value: rustfsadmin
          - name: AWS_SECRET_ACCESS_KEY
            value: rustfsadmin
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
      containers:
      - name: create-bucket
        image: docker.io/rustfs/rc@sha256:ca85fbee9f96425446915cb08b41d5e246c782eeb3f6a00d3b8294fce5219891
        command:
          - /bin/sh
          - -c
          - |
            rc alias set local http://rustfs:9000 "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"
            rc mb --ignore-existing local/complytime-evidence
        env:
          - name: AWS_ACCESS_KEY_ID
            value: rustfsadmin
          - name: AWS_SECRET_ACCESS_KEY
            value: rustfsadmin
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ALL]
  backoffLimit: 3
