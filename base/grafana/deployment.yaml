# Grafana deployment — serves HTTPS with anonymous auth (base default).
# Stage/production overlays add OIDC authentication via env var patches.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          - name: timeout
            value: "2"
          - name: attempts
            value: "3"
          - name: ndots
            value: "1"
      containers:
        - name: grafana
          image: docker.io/grafana/grafana:11.6.0
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: https
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SERVER_PROTOCOL
              value: "https"
            - name: GF_SERVER_CERT_FILE
              value: "/etc/tls/tls.crt"
            - name: GF_SERVER_CERT_KEY
              value: "/etc/tls/tls.key"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/ds.yaml
              subPath: ds.yaml
            - name: grafana-tls
              mountPath: /etc/tls
              readOnly: true
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTPS
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
              scheme: HTTPS
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: grafana-tls
          secret:
            secretName: grafana-tls
        - name: grafana-storage
          persistentVolumeClaim:
            claimName: grafana-storage
        - name: tmp
          emptyDir: {}
