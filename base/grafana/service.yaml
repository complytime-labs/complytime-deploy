# Grafana service — OpenShift auto-generates TLS cert via serving-cert annotation.
apiVersion: v1
kind: Service
metadata:
  name: grafana
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: grafana-tls
spec:
  selector:
    app: grafana
  ports:
    - name: https-3000
      port: 3000
      targetPort: https
