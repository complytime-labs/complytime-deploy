# Kustomize resources for Loki — log aggregation and storage.
# Config is sourced from local-config.yaml (single source of truth for all deployments).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - pvc.yaml
  - deployment.yaml
  - service.yaml

configMapGenerator:
  - name: loki-config
    files:
      - local-config.yaml
