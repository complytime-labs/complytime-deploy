# Loki deployment — internal log storage, accessed by Collector (write) and Grafana (read).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      dnsPolicy: ClusterFirst
      dnsConfig:
        options:
          - name: timeout
            value: "2"
          - name: attempts
            value: "3"
          - name: ndots
            value: "1"
      containers:
        - name: loki
          image: docker.io/grafana/loki:3.5.1
          imagePullPolicy: Always
          args: ["-config.file=/etc/loki/local-config.yaml"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3100
              name: http
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: config
              mountPath: /etc/loki/local-config.yaml
              subPath: local-config.yaml
            - name: storage
              mountPath: /loki-storage
            - name: loki-tls
              mountPath: /etc/tls
              readOnly: true
            - name: service-ca-bundle
              mountPath: /etc/ssl/certs/service-ca.crt
              subPath: service-ca.crt
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: loki-wal
              mountPath: /loki
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
              scheme: HTTPS
            initialDelaySeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
              scheme: HTTPS
            initialDelaySeconds: 45
            timeoutSeconds: 5
      volumes:
        - name: config
          configMap:
            name: loki-config
        - name: storage
          persistentVolumeClaim:
            claimName: loki-storage
        - name: loki-tls
          secret:
            secretName: loki-tls
        - name: service-ca-bundle
          configMap:
            name: service-ca-bundle
            items:
              - key: service-ca.crt
                path: service-ca.crt
        - name: tmp
          emptyDir: {}
        - name: loki-wal
          emptyDir: {}
